    <script>
    /* ---- tidy-animations shared infrastructure ----
     * Ported from the anime.js + RevealJS lessons. Kept deliberately small:
     * coordinate conversion, slide lookup, and a fragment/slide gating helper
     * that drives a single idempotent render(stage) per animation.
     */
    window.TM = window.TM || {};

    /* Register listeners as soon as Reveal exists — do NOT wait for 'ready',
     * because include-after-body scripts often load after Reveal initialises. */
    TM.onReveal = function (cb) {
      (function go() {
        if (typeof Reveal === 'undefined' || !Reveal.on) { setTimeout(go, 50); return; }
        cb();
      })();
    };

    /* ---- activity tracking (so a recorder can wait for "idle" instead of guessing
     * delays). Every animation goes through TM.anime; intentional pauses use
     * TM.busyInc/busyDec so they count as busy too. TM.idle() is true only when
     * nothing is animating and no pause is pending. */
    TM._busy = 0;
    TM.busyInc = function () { TM._busy++; };
    TM.busyDec = function () { TM._busy = Math.max(0, TM._busy - 1); };
    TM.idle = function () { return TM._busy === 0; };
    TM.anime = function (params) {
      TM.busyInc();
      const inst = anime(params);
      inst.finished.then(TM.busyDec, TM.busyDec);  // decrement when it settles (or errors)
      return inst;
    };
    /* a tracked timed gap: stays "busy" for `ms`, then runs fn. Increment the next
     * step before this decrements (do that inside fn) to avoid a momentary idle dip. */
    TM.pause = function (ms, fn) {
      TM.busyInc();
      setTimeout(function () { if (fn) fn(); TM.busyDec(); }, ms);
    };

    /* screen pixels -> slide internal coordinate units */
    TM.cssToSlide = function (px, section) {
      const w = section.getBoundingClientRect().width;
      return px * (Reveal.getConfig().width / w);
    };

    /* find the <section> carrying a marker class (querySelector won't match self) */
    TM.sectionFor = function (markerClass) {
      const el = document.querySelector('.' + markerClass);
      return el ? el.closest('section') : null;
    };

    /* Gate an animation behind a slide + ordered fragment ids.
     *   markerClass : class on the slide section
     *   fragmentIds : array of fragment element ids, in advancing order
     *   render(stage): called with the number of those fragments currently visible
     * Fires on fragmentshown/hidden and on slidechanged (forward, back, and
     * direct-link arrival all resolve to the same stage number). */
    TM.gate = function ({ markerClass, fragmentIds, render }) {
      function visibleStage() {
        let n = 0;
        for (const id of fragmentIds) {
          const f = document.getElementById(id);
          if (f && f.classList.contains('visible')) n++; else break;
        }
        return n;
      }
      function onThisSlide(slide) {
        return slide && (slide.classList.contains(markerClass) ||
                         slide.querySelector('.' + markerClass));
      }
      TM.onReveal(function () {
        Reveal.on('fragmentshown',  () => { if (onThisSlide(Reveal.getCurrentSlide())) render(visibleStage()); });
        Reveal.on('fragmenthidden', () => { if (onThisSlide(Reveal.getCurrentSlide())) render(visibleStage()); });
        Reveal.on('slidechanged', ({ currentSlide }) => {
          if (onThisSlide(currentSlide)) render(visibleStage());
        });
        // direct-link / reload arrival: render once Reveal can report the slide
        (function boot() {
          const cur = Reveal.getCurrentSlide && Reveal.getCurrentSlide();
          if (!cur) { setTimeout(boot, 60); return; }
          if (onThisSlide(cur)) render(visibleStage());
        })();
      });
    };

    /* ---- orbital + Snowflake: shared build / layout base ----
     * The two animation modules (orbital-roundtrip, orbital-inplace) share an
     * identical starting frame, the same layout maths, the same data table, and the
     * same DOM-construction helpers. All of that lives here so a geometry change is
     * made once. Each module only owns its own phase choreography.
     *
     * ORB.build(opts) reads the window.ORB_* knobs, lays out and builds the static
     * stage 0 actors, and returns a context object with every constant, helper, and
     * element reference a module needs. It is idempotent: the DOM is built once and
     * the same context is returned on every call (the stage may not exist yet when
     * the module script first runs, so modules call build() lazily inside render()).

     * opts.groupSession: when true the session panel/header/card are wrapped in a
     *   single .orb-rgroup so they can wind down (dim) as one (in-place module); when
     *   false they sit directly on the stage and are dimmed individually (round-trip

     *   module toggles state classes on — the group, or the panel box, accordingly.

    window.ORB = window.ORB || {};

    ORB.build = function (opts) {
      opts = opts || {};
      const groupSession = !!opts.groupSession;

      // each deck can host more than one independent stage (e.g. the combined
      // before+after deck), so the build cache is keyed by the stage's element id.
      const stageId = opts.stageId || 'orb-stage';

      stage.style.height = STAGE_H + 'px';

        sf.style.width = SF.w + 'px';
        sf.style.height = SF.h + 'px';

      let rgroup = null;

        rgroup.className = 'orb-rgroup';
        stage.appendChild(rgroup);

      card.style.height = CARD.h + 'px';
      const ct = document.createElement('div');
      ct.className = 'orb-card-title';
      ct.textContent = 'Trained model';
      const cc = document.createElement('div');
      cc.className = 'orb-card-code';
      cc.textContent = MODEL_LABEL;

      // where the data table gets its own nested "Database" box that mirrors the
      // Workbench box — both live inside the Snowflake account (Database = where
      // tables physically sit, the storage counterpart to the compute session).
      if (!POSIT) {
        const panel = node('orb-snowflake', PANEL.x, PANEL.y, stage);
        panel.style.width = PANEL.w + 'px';
        panel.style.height = PANEL.h + 'px';
      } else {
        const db = node('orb-database', PANEL.x, PANEL.y, stage);
        db.style.width = PANEL.w + 'px';
        db.style.height = PANEL.h + 'px';
        const dbh = node('orb-database-header', PANEL.x + 24, PANEL.y + 22, stage);
        const dbicon = document.createElement('span');
        dbicon.className = 'orb-dbicon';
        const dblabel = document.createElement('span');
        dblabel.textContent = 'Database';
        dbh.appendChild(dbicon);
        dbh.appendChild(dblabel);
      }
      const hX = POSIT ? SF.x + 26 : PANEL.x + 24;
      const hY = POSIT ? SF.y + 16 : PANEL.y + 22;
      const header = node('orb-snowflake-header', hX, hY, stage);
      const hlabel = document.createElement('span');
      hlabel.textContent = 'Snowflake';
      header.appendChild(hlabel);

      // header row (fixed — stays put while the body scrolls beneath it)
      COLS.forEach((name, c) => {
        const { x, y } = cellXY(c, 0);

        const cell = node(cls, x, y, stage);

        cell.textContent = name;
      });

      // clipped viewport (below the header) + inner scroller for the body rows
      const view = node('orb-tableview', TABLE_X, TABLE_Y + HEAD_H, stage);
      view.style.width = TABLE_W + 'px';
      view.style.height = VIEW_H + 'px';
      const scroller = document.createElement('div');
      scroller.className = 'orb-scroller';
      view.appendChild(scroller);
      anime.set(scroller, { translateY: 0 });   // never via the translate() shorthand

      const predSpans = [];         // .pred spans for the first batch (fade in)
      const predSpans2 = [];        // .pred spans for the freshly-scrolled batch

      // one body row of cells; predList collects the .pred spans (start empty)

        for (let c = 0; c < COLS.length; c++) {
          const { x, y } = bodyCellXY(c, idx);
          if (c === PRED_COL) {
            const cell = node('orb-cell orb-pred', x, y, scroller);
            sizeCell(cell, false);
            const span = document.createElement('span');
            span.style.opacity = 0;           // value fades in when filled
            cell.appendChild(span);
            predList.push(span);
          } else {
            const cell = node('orb-cell', x, y, scroller);
            sizeCell(cell, false);
            cell.textContent = rowData[c];
          }
        }
      }
      function buildDots(idx) {
        COLS.forEach((name, c) => {
          const { x, y } = bodyCellXY(c, idx);
          const cell = node('orb-cell orb-dots', x, y, scroller);
          sizeCell(cell, false);
          cell.textContent = '⋮';
        });
      }

      // batch 1 (visible) + its trailing ⋮, then batch 2 (new data, below the fold)
      // + its own ⋮ — exactly one page apart so a one-page scroll swaps them.
      for (let r = 0; r < NROWS; r++) buildRow(DATA[r], r, predSpans);
      buildDots(NROWS);
      for (let r = 0; r < NROWS; r++) buildRow(NEW_DATA[r], NROWS + 1 + r, predSpans2);
      buildDots(2 * NROWS + 1);

      // Posit: a dashed divider marking the runtime boundary the data crosses inside
      // Snowflake (vertical line horizontally; horizontal line vertically)
      if (POSIT) {
        if (VERT) {
          const by = (RPANEL.y + RPANEL.h + TABLE_Y) / 2;
          const bd = node('orb-boundary-h', TABLE_X - 10, by, stage);
          bd.style.width = (TABLE_W + 20) + 'px';
        } else {
          const bx = (RPANEL.x + RPANEL.w + TABLE_X) / 2;
          const bd = node('orb-boundary', bx, TABLE_Y - 10, stage);
          bd.style.height = (HEAD_H + (NROWS + 1) * ROW_H + 20) + 'px';
        }
      }

      ORB._ctx[stageId] = {
        // knobs / canvas
        BLUE, RBLUE, MODEL_LABEL, POSIT, SESSION_LABEL, SESSION_LOGO, VERT,
        STAGE_W, STAGE_H,
        // regions
        SF, RPANEL, CARD, PANEL,
        // table geometry
        COLS, PRED_COL, CELL_W, HEAD_H, ROW_H, NROWS, TABLE_W, TABLE_X, TABLE_Y, VIEW_H,
        // data
        DATA, NEW_DATA, PRED_VALS, NEW_PRED_VALS,
        // helpers
        node, cellXY, bodyCellXY, sizeCell, featureRowY,
        // element refs
        cardEl: card,
        rpanelEl: groupSession ? rgroup : rpanel,   // the element a module dims
        statusEl: status,
        statusText,
        scrollerEl: scroller,
        predSpans, predSpans2,
      };
      return ORB._ctx[stageId];

    <script>
    /* ---- shared deck navigation overlay ----
     * Two affordances, loaded on every deck:
     *   1. a persistent "Home" link (top-left) back to the landing page.
     *   2. a completion call-to-action that fades in once every fragment on the
     *      orbital slide is visible (the flow is finished):
     *        - round-trip decks ("before") offer "Continue to in-place ->",
     *          linking to the matching in-place deck so before -> after is one flow.
     *        - in-place decks ("after") offer "Replay from round-trip", closing the
     *          loop back to the matching round-trip deck.
     *      Both always also offer "Home".
     * The counterpart deck is derived from the current filename by swapping
     * roundtrip <-> inplace, so every variant (vertical / python / posit) maps to
     * its sibling automatically.
     */
    (function () {
      const file = (location.pathname.split('/').pop() || '').replace(/\.html$/, '') || 'index';
      const isRoundtrip = /roundtrip/.test(file);
      const isInplace   = /inplace/.test(file);
      const counterpart = isRoundtrip ? file.replace('roundtrip', 'inplace')
                        : isInplace   ? file.replace('inplace', 'roundtrip')
                        : null;

      const ACCENT = window.ORB_SNOWFLAKE || '#29B5E8';

      // ---- persistent Home link ----
      const home = document.createElement('a');
      home.className = 'orb-nav-home';
      home.href = 'index.html';
      home.setAttribute('aria-label', 'Back to home');
      home.innerHTML = '← Home';

      // ---- completion call-to-action ----
      const cta = document.createElement('div');
      cta.className = 'orb-nav-cta';
      const parts = [];
      if (isRoundtrip && counterpart) {
        parts.push('<span class="orb-nav-cta-label">That’s the round-trip.</span>');
        parts.push('<a class="orb-nav-btn orb-nav-btn-go" href="' + counterpart + '.html">See the orbital way →</a>');
      } else if (isInplace && counterpart) {
        parts.push('<span class="orb-nav-cta-label">That’s the orbital way.</span>');
        parts.push('<a class="orb-nav-btn" href="' + counterpart + '.html">↺ Replay the round-trip</a>');
      }
      parts.push('<a class="orb-nav-btn" href="index.html">All decks</a>');
      cta.innerHTML = parts.join('');

      document.addEventListener('DOMContentLoaded', function () {
        document.body.appendChild(home);
        document.body.appendChild(cta);
        document.documentElement.style.setProperty('--orb-nav-accent', ACCENT);
      });

      // ---- reveal completion gating: show the CTA when every fragment is shown ----
      function frags(slide) { return slide ? slide.querySelectorAll('.fragment') : []; }
      function allShown(slide) {
        const f = frags(slide);
        if (!f.length) return false;
        for (const el of f) if (!el.classList.contains('visible')) return false;
        return true;
      }
      function sync() {
        if (typeof Reveal === 'undefined' || !Reveal.getCurrentSlide) return;
        // only on the final slide of the deck (so the combined before+after deck
        // doesn't surface the CTA between its two sections)
        const last = !Reveal.isLastSlide || Reveal.isLastSlide();
        const done = last && allShown(Reveal.getCurrentSlide());
        cta.classList.toggle('orb-nav-cta-show', done);
      }
      (function boot() {
        if (typeof Reveal === 'undefined' || !Reveal.on) { setTimeout(boot, 50); return; }
        Reveal.on('fragmentshown',  sync);
        Reveal.on('fragmenthidden', sync);
        Reveal.on('slidechanged',   sync);
        (function ready() {
          if (!Reveal.getCurrentSlide || !Reveal.getCurrentSlide()) { setTimeout(ready, 60); return; }
          sync();
        })();
      })();
    })();
    </script>
    <script>
    /* ---- orbital + Snowflake: the round-trip ("before") ----
     * Marker slide: .orb-slide   Stage container: #orb-stage
     * render(stage) is idempotent (stage = number of visible gating fragments).
     *
     * The shared starting frame, layout maths, data table and DOM helpers come from
     * ORB.build() in js/orbital-base.html. This module owns only the round-trip
     * choreography: data collects from the table, travels to a live session, is
     * scored, and the prediction travels back to fill .pred — then the session
     * idles, and each fresh batch must make the whole trip again.
     */
    /* Exposed as an init function so a deck can run it on a specific stage/slide:
     * the combined before+after deck calls it with its own stageId + marker +
     * fragment ids. Defaults reproduce the standalone single-deck behaviour. */
    ORB.initRoundtrip = function (opts) {
      opts = opts || {};
      const STAGE_ID = opts.stageId || 'orb-stage';
      const MARKER = opts.markerClass || 'orb-slide';
      const FRAGS = opts.fragmentIds ||
        ['orb-rt-out', 'orb-rt-back', 'orb-rt-newscroll', 'orb-rt-new-out', 'orb-rt-new-back'];

      // shared context + derived geometry, populated lazily once the stage exists
      let C = null;
      let NROWS, ROW_H, HEAD_H, CELL_W, COLS, PRED_COL, TABLE_X, TABLE_W, TABLE_Y,
          VIEW_H, CARD, VERT, featureRowY,
          cardEl, rpanelEl, statusEl, statusText, scrollerEl,
          predSpans, predSpans2, PRED_VALS, NEW_PRED_VALS;
      // derived (computed in ensure())
      let FEATURE_W, CARD_CX, CARD_CY, PKT, ENTER, EXIT, PRED_LAND, GHOST_LAND, SCROLL_Y;

      // round-trip state machine:
      //   0 = nothing  1 = data sent to session + scoring  2 = prediction returned
      //   3 = new batch revealed  4 = new batch sent (re-woken + scoring)  5 = returned
      // token invalidates pending chained callbacks when we change phase mid-flight.
      let rt = { phase: 0, els: [], token: 0, packet: null, gear: null, gearSpin: null };

      function ensure() {
        if (C) return true;
        C = ORB.build({ groupSession: false, stageId: STAGE_ID });   // session dimmed via the panel box
        if (!C) return false;
        ({ NROWS, ROW_H, HEAD_H, CELL_W, COLS, PRED_COL, TABLE_X, TABLE_W, TABLE_Y,
           VIEW_H, CARD, VERT, featureRowY,
           cardEl, rpanelEl, statusEl, statusText, scrollerEl,
           predSpans, predSpans2, PRED_VALS, NEW_PRED_VALS } = C);

        // ---- derived geometry: the round-trip's lane between table and card -----
        FEATURE_W = (COLS.length - 1) * CELL_W;            // span of feature cols
        SCROLL_Y = VIEW_H;                                 // one-page scroll distance
        // packet's pickup/staging spot near the table: below it (horizontal) or above
        // it toward the session (vertical).
        PKT = {
          startX: TABLE_X + TABLE_W / 2 - 65,
          startY: VERT ? TABLE_Y - 72
                       : TABLE_Y + HEAD_H + (NROWS + 1) * ROW_H + 7,
        };
        // the packet enters/exits the workflow card on the side facing the data
        // (horizontal: in the top, out the bottom; vertical: data in the LEFT edge,
        // predictions out the RIGHT edge). packet is 130x52 (half = 65/26). Each side
        // has a staging point (sx,sy) and an into/out-of-card point; both axes tween
        // so one set of code serves both orientations (the unchanged axis is a no-op).
        CARD_CX = CARD.x + CARD.w / 2 - 65;
        CARD_CY = CARD.y + CARD.h / 2 - 26;                // packet centred on the card row
        ENTER = VERT
          ? { sx: CARD.x - 150, sy: CARD_CY,            ix: CARD.x - 30,          iy: CARD_CY }
          : { sx: CARD_CX,      sy: CARD.y - 65,        ix: CARD_CX,              iy: CARD.y + 18 };
        EXIT = VERT
          ? { sx: CARD.x + CARD.w - 110, sy: CARD_CY,            ox: CARD.x + CARD.w + 10, oy: CARD_CY }
          : { sx: CARD_CX,               sy: CARD.y + CARD.h - 72, ox: CARD_CX,            oy: CARD.y + CARD.h + 12 };
        // where the returning packet lands: centred over the .pred column / data rows
        PRED_LAND = {
          x: TABLE_X + PRED_COL * CELL_W + CELL_W / 2 - 65,
          y: featureRowY(0) + (NROWS * ROW_H) / 2 - 26,
        };
        // ghost copies of each data row drop into the packet ("collecting" the data).
        // ghosts are FEATURE_W wide and scale down around their own centre, so to land
        // *inside* the 130x52 packet we target the packet's centre, not its left edge.
        GHOST_LAND = {
          x: PKT.startX + 65 - FEATURE_W / 2,
          y: PKT.startY + 26 - (ROW_H - 12) / 2,
        };
        return true;
      }

      function fly(el, x, y, dur, cb) {
        TM.anime({
          targets: el, translateX: x, translateY: y,
          duration: dur, easing: 'easeInOutCubic',
          complete: cb,
        });
      }

      // ---- small element builders -------------------------------------------
      // packet positioned via anime translateX/Y (never node()'s `translate()`
      // shorthand — anime can't parse it and would double the offset)
      function makePacket(x, y, text) {
        const stage = document.getElementById(STAGE_ID);
        const pkt = document.createElement('div');
        pkt.className = 'orb-node orb-packet';
        pkt.textContent = text;
        stage.appendChild(pkt);
        rt.els.push(pkt);
        rt.packet = pkt;
        anime.set(pkt, { translateX: x, translateY: y });
        return pkt;
      }
      function collectRows() {
        const stage = document.getElementById(STAGE_ID);
        for (let r = 0; r < NROWS; r++) {
          const g = document.createElement('div');
          g.className = 'orb-node orb-ghost';
          g.style.width = FEATURE_W + 'px';
          g.style.height = (ROW_H - 12) + 'px';
          stage.appendChild(g);
          rt.els.push(g);
          anime.set(g, { translateX: TABLE_X, translateY: featureRowY(r) + 6, opacity: 0, scale: 1 });
          TM.anime({
            targets: g,
            keyframes: [
              { opacity: 0.85, duration: 140 },                                   // light up the row
              { translateX: GHOST_LAND.x, translateY: GHOST_LAND.y, scale: 0.25, opacity: 0, duration: 480 },
            ],
            delay: r * 70,
            easing: 'easeInOutQuad',
          });
        }
      }

      // reverse of collectRows: ghosts grow back out of the packet onto each data
      // row, as if the collected rows were being put back where they came from.
      function releaseRows() {
        const stage = document.getElementById(STAGE_ID);
        for (let r = 0; r < NROWS; r++) {
          const g = document.createElement('div');
          g.className = 'orb-node orb-ghost';
          g.style.width = FEATURE_W + 'px';
          g.style.height = (ROW_H - 12) + 'px';
          stage.appendChild(g);
          rt.els.push(g);
          anime.set(g, { translateX: GHOST_LAND.x, translateY: GHOST_LAND.y, scale: 0.25, opacity: 0 });
          TM.anime({
            targets: g,
            keyframes: [
              { translateX: TABLE_X, translateY: featureRowY(r) + 6, scale: 1, opacity: 0.85, duration: 480 },
              { opacity: 0, duration: 140 },                                    // settle back into the row
            ],
            delay: r * 70,
            easing: 'easeInOutQuad',
          });
        }
      }

      // a gear that spins while the workflow "thinks". Position via CSS left/top so
      // anime owns ONLY rotate (mixing with a translate() shorthand would break it).
      function showGear() {
        if (rt.gear) return;                       // idempotent
        const stage = document.getElementById(STAGE_ID);
        const gear = document.createElement('div');
        gear.className = 'orb-gear';
        gear.textContent = '⚙';
        gear.style.left = (CARD.x + CARD.w - 44) + 'px';
        gear.style.top = (CARD.y + 8) + 'px';
        gear.style.opacity = 0;
        stage.appendChild(gear);
        rt.gear = gear;
        rt.els.push(gear);
        TM.anime({ targets: gear, opacity: 1, duration: 250, easing: 'easeOutQuad' });
        // infinite spin: BARE anime (not TM.anime) so it never pins the busy counter
        rt.gearSpin = anime({ targets: gear, rotate: '360deg', duration: 1700, loop: true, easing: 'linear' });
      }
      function removeGear() {
        if (!rt.gear) return;
        anime.remove(rt.gear);
        rt.gear.remove();
        const i = rt.els.indexOf(rt.gear); if (i >= 0) rt.els.splice(i, 1);
        rt.gear = null; rt.gearSpin = null;
      }

      function fillPred(spans, vals) {
        spans.forEach((s, i) => { s.textContent = vals[i]; });
        TM.anime({
          targets: spans, opacity: [0, 1],
          duration: 350, delay: anime.stagger(80), easing: 'easeOutQuad',
        });
      }
      function emptyPred(spans) {
        anime.remove(spans);
        spans.forEach((s) => { s.style.opacity = 0; s.textContent = ''; });
      }

      // the round trip needs a live session: it sits idle between batches and must
      // be woken (and kept warm) to score each new batch — the cost orbital avoids.
      function goIdle() {
        statusEl.classList.add('orb-status-off');
        statusText.textContent = 'idle';
        rpanelEl.classList.remove('orb-rsession-busy');
        rpanelEl.classList.add('orb-rsession-idle');
        if (cardEl) cardEl.classList.add('orb-card-idle');
      }
      function wakeUp() {
        statusEl.classList.remove('orb-status-off');
        statusText.textContent = 'running';
        rpanelEl.classList.remove('orb-rsession-idle');
        if (cardEl) cardEl.classList.remove('orb-card-idle');
      }
      // card + panel light up while the session is actively scoring
      function showScoring() {
        cardEl.classList.add('orb-scoring');
        rpanelEl.classList.add('orb-rsession-busy');
        showGear();
      }

      function clearAll() {
        anime.remove(rt.els);
        rt.els.forEach((el) => el.remove());
        rt.els = [];
        rt.packet = null;
        rt.gear = null; rt.gearSpin = null;
        if (cardEl) cardEl.classList.remove('orb-scoring');
        emptyPred(predSpans);
        emptyPred(predSpans2);
        if (scrollerEl) { anime.remove(scrollerEl); anime.set(scrollerEl, { translateY: 0 }); }
        // back to the default "running" session (idle/wake states are phase-specific)
        statusEl.classList.remove('orb-status-off');
        statusText.textContent = 'running';
        rpanelEl.classList.remove('orb-rsession-busy');
        rpanelEl.classList.remove('orb-rsession-idle');
        if (cardEl) cardEl.classList.remove('orb-card-idle');
      }

      // ---- phase transitions -------------------------------------------------
      // forward single steps animate; back-nav and deep-link jumps snap instantly
      // (idempotent: each branch fully defines the target visual state).
      function snapTo(phase) {
        rt.token++;
        clearAll();
        rt.phase = phase;
        if (phase === 0) return;
        if (phase === 1) {
          // data has entered the workflow and is being computed (no visible packet)
          showScoring();
          return;
        }
        // phases 2-5 all have the first batch already scored, session idle
        predSpans.forEach((s, i) => { s.textContent = PRED_VALS[i]; s.style.opacity = 1; });
        if (phase === 2) { goIdle(); return; }      // round trip done, session idles
        // phases 3,4,5: scrolled down to the fresh batch
        anime.set(scrollerEl, { translateY: -SCROLL_Y });

        if (phase === 4) {                           // new batch sent, session re-woken
          wakeUp();
          showScoring();

          predSpans2.forEach((s, i) => { s.textContent = NEW_PRED_VALS[i]; s.style.opacity = 1; });
          goIdle();
        }
      }

      // collect the currently-visible rows into a packet and ship it to the session,
      // which lights up and starts scoring. (Geometry is the same for either batch:
      // after the one-page scroll the new rows sit where the old ones were.)
      function sendData(phase) {
        rt.phase = phase;
        const gen = ++rt.token, live = () => rt.token === gen;
        const pkt = makePacket(PKT.startX, PKT.startY, 'data');
        pkt.style.opacity = 0;
        TM.anime({ targets: pkt, opacity: 1, scale: [0.8, 1], duration: 320, easing: 'easeOutBack' });
        collectRows();
        const COLLECT_MS = (NROWS - 1) * 70 + 140 + 480 + 120;   // last ghost lands + beat
        TM.pause(COLLECT_MS, () => {
          if (!live()) return;
          // travel to the session, then enter the workflow (top, or left edge in
          // vertical decks)
          fly(pkt, ENTER.sx, ENTER.sy, 950, () => {
            if (!live()) return;

          }
          // Inspect non-navigation links and adorn them if external
         var links = window.document.querySelectorAll('a[href]:not(.nav-link):not(.navbar-brand):not(.toc-action):not(.sidebar-link):not(.sidebar-item-toggle):not(.pagination-link):not(.no-external):not([aria-hidden]):not(.dropdown-item):not(.quarto-navigation-tool):not(.about-link)');
          for (var i=0; i<links.length; i++) {
            const link = links[i];
            if (!isInternal(link.href)) {
              // undo the damage that might have been done by quarto-nav.js in the case of
              // links that we want to consider external
              if (link.dataset.originalHref !== undefined) {
                link.href = link.dataset.originalHref;
              }
            }
          }
        function tippyHover(el, contentFn, onTriggerFn, onUntriggerFn) {
          const config = {
            allowHTML: true,
            maxWidth: 500,
            delay: 100,
            arrow: false,
            appendTo: function(el) {
                return el.closest('section.slide') || el.parentElement;
            },
            interactive: true,
            interactiveBorder: 10,
            theme: 'light-border',
            placement: 'bottom-start',
          };
          if (contentFn) {
            config.content = contentFn;
          }
          if (onTriggerFn) {
            config.onTrigger = onTriggerFn;
          }
          if (onUntriggerFn) {
            config.onUntrigger = onUntriggerFn;
          }
            config['offset'] = [0,0];
            config['maxWidth'] = 700;
          window.tippy(el, config); 
        }
        const noterefs = window.document.querySelectorAll('a[role="doc-noteref"]');
        for (var i=0; i<noterefs.length; i++) {
          const ref = noterefs[i];
          tippyHover(ref, function() {
            // use id or data attribute instead here
            let href = ref.getAttribute('data-footnote-href') || ref.getAttribute('href');
            try { href = new URL(href).hash; } catch {}
            const id = href.replace(/^#\/?/, "");
            const note = window.document.getElementById(id);
            if (note) {
              return note.innerHTML;
            } else {
              return "";
            }
          });
        }
        const findCites = (el) => {
          const parentEl = el.parentElement;
          if (parentEl) {
            const cites = parentEl.dataset.cites;
            if (cites) {
              return {
                el,
                cites: cites.split(' ')
              };
            } else {
              return findCites(el.parentElement)
            }
          } else {
            return undefined;
          }
        };
        var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
        for (var i=0; i<bibliorefs.length; i++) {
          const ref = bibliorefs[i];
          const citeInfo = findCites(ref);
          if (citeInfo) {
            tippyHover(citeInfo.el, function() {
              var popup = window.document.createElement('div');
              citeInfo.cites.forEach(function(cite) {
                var citeDiv = window.document.createElement('div');
                citeDiv.classList.add('hanging-indent');
                citeDiv.classList.add('csl-entry');
                var biblioDiv = window.document.getElementById('ref-' + cite);
                if (biblioDiv) {
                  citeDiv.innerHTML = biblioDiv.innerHTML;
                }
                popup.appendChild(citeDiv);
              });
              return popup.innerHTML;
            });
          }
        }
      });
      </script>
