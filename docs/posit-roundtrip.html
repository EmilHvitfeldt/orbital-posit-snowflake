    <script>
    /* ---- tidy-animations shared infrastructure ----
     * Ported from the anime.js + RevealJS lessons. Kept deliberately small:
     * coordinate conversion, slide lookup, and a fragment/slide gating helper
     * that drives a single idempotent render(stage) per animation.
     */
    window.TM = window.TM || {};

    /* Register listeners as soon as Reveal exists — do NOT wait for 'ready',
     * because include-after-body scripts often load after Reveal initialises. */
    TM.onReveal = function (cb) {
      (function go() {
        if (typeof Reveal === 'undefined' || !Reveal.on) { setTimeout(go, 50); return; }
        cb();
      })();
    };

    /* ---- activity tracking (so a recorder can wait for "idle" instead of guessing
     * delays). Every animation goes through TM.anime; intentional pauses use
     * TM.busyInc/busyDec so they count as busy too. TM.idle() is true only when
     * nothing is animating and no pause is pending. */
    TM._busy = 0;
    TM.busyInc = function () { TM._busy++; };
    TM.busyDec = function () { TM._busy = Math.max(0, TM._busy - 1); };
    TM.idle = function () { return TM._busy === 0; };
    TM.anime = function (params) {
      TM.busyInc();
      const inst = anime(params);
      inst.finished.then(TM.busyDec, TM.busyDec);  // decrement when it settles (or errors)
      return inst;
    };
    /* a tracked timed gap: stays "busy" for `ms`, then runs fn. Increment the next
     * step before this decrements (do that inside fn) to avoid a momentary idle dip. */
    TM.pause = function (ms, fn) {
      TM.busyInc();
      setTimeout(function () { if (fn) fn(); TM.busyDec(); }, ms);
    };

    /* screen pixels -> slide internal coordinate units */
    TM.cssToSlide = function (px, section) {
      const w = section.getBoundingClientRect().width;
      return px * (Reveal.getConfig().width / w);
    };

    /* find the <section> carrying a marker class (querySelector won't match self) */
    TM.sectionFor = function (markerClass) {
      const el = document.querySelector('.' + markerClass);
      return el ? el.closest('section') : null;
    };

    /* Gate an animation behind a slide + ordered fragment ids.
     *   markerClass : class on the slide section
     *   fragmentIds : array of fragment element ids, in advancing order
     *   render(stage): called with the number of those fragments currently visible
     * Fires on fragmentshown/hidden and on slidechanged (forward, back, and
     * direct-link arrival all resolve to the same stage number). */
    TM.gate = function ({ markerClass, fragmentIds, render }) {
      function visibleStage() {
        let n = 0;
        for (const id of fragmentIds) {
          const f = document.getElementById(id);
          if (f && f.classList.contains('visible')) n++; else break;
        }
        return n;
      }
      function onThisSlide(slide) {
        return slide && (slide.classList.contains(markerClass) ||
                         slide.querySelector('.' + markerClass));
      }
      TM.onReveal(function () {
        Reveal.on('fragmentshown',  () => { if (onThisSlide(Reveal.getCurrentSlide())) render(visibleStage()); });
        Reveal.on('fragmenthidden', () => { if (onThisSlide(Reveal.getCurrentSlide())) render(visibleStage()); });
        Reveal.on('slidechanged', ({ currentSlide }) => {
          if (onThisSlide(currentSlide)) render(visibleStage());
        });
        // direct-link / reload arrival: render once Reveal can report the slide
        (function boot() {
          const cur = Reveal.getCurrentSlide && Reveal.getCurrentSlide();
          if (!cur) { setTimeout(boot, 60); return; }
          if (onThisSlide(cur)) render(visibleStage());
        })();
      });
    };
    </script>

    /* ---- orbital + Snowflake: round-trip vs. in-place ----
     * Marker slide: .orb-slide   Stage container: #orb-stage  (1180 x 600)
     * render(stage) is idempotent (stage = number of visible gating fragments).

      const RPANEL = VERT

        const hX = POSIT ? SF.x + 26 : PANEL.x + 24;
        const hY = POSIT ? SF.y + 16 : PANEL.y + 22;
        const header = node('orb-snowflake-header', hX, hY, stage);
        const flake = document.createElement('span');
        flake.className = 'orb-flake';
        flake.textContent = '❄';   // ❄
        const hlabel = document.createElement('span');
        hlabel.textContent = 'Snowflake';
        header.appendChild(flake);
        header.appendChild(hlabel);

        // header row
        COLS.forEach((name, c) => {
          const { x, y } = cellXY(c, 0);
          const cls = 'orb-cell orb-head' + (c === PRED_COL ? ' orb-pred' : '');
          const cell = node(cls, x, y, stage);
          sizeCell(cell, true);
          cell.textContent = name;
        });
        // data rows
        for (let r = 0; r < NROWS; r++) {
          for (let c = 0; c < COLS.length; c++) {
            const { x, y } = cellXY(c, r + 1);
            if (c === PRED_COL) {
              const cell = node('orb-cell orb-pred', x, y, stage);
              sizeCell(cell, false);
              const span = document.createElement('span');
              span.style.opacity = 0;           // value fades in when filled
              cell.appendChild(span);
              predSpans.push(span);
            } else {
              const cell = node('orb-cell', x, y, stage);
              sizeCell(cell, false);
              cell.textContent = DATA[r][c];
            }
          }
        }
        // "more rows" ellipsis row
        COLS.forEach((name, c) => {
          const { x, y } = cellXY(c, NROWS + 1);
          const cell = node('orb-cell orb-dots', x, y, stage);
          sizeCell(cell, false);
          cell.textContent = '⋮';
        });

        // Posit: a dashed divider marking the runtime boundary the data crosses
        // inside Snowflake (vertical line horizontally; horizontal line vertically)
        if (POSIT) {
          if (VERT) {
            const by = (RPANEL.y + RPANEL.h + TABLE_Y) / 2;
            const bd = node('orb-boundary-h', TABLE_X - 10, by, stage);
            bd.style.width = (TABLE_W + 20) + 'px';
          } else {
            const bx = (RPANEL.x + RPANEL.w + TABLE_X) / 2;
            const bd = node('orb-boundary', bx, TABLE_Y - 10, stage);
            bd.style.height = (HEAD_H + (NROWS + 1) * ROW_H + 20) + 'px';
          }
        }
        return true;
      }

      // ---- stage 1: the round-trip (data leaves Snowflake, gets scored in the R
      // session, predictions travel back, .pred fills). The double traversal across
      // the lane is what sells "slow". -----------------------------------------
      // packet's pickup/staging spot near the table: below it (horizontal) or above
      // it toward the session (vertical). Derived so it follows the layout.
      const PKT = {
        startX: TABLE_X + TABLE_W / 2 - 65,
        startY: VERT ? TABLE_Y - 72
                     : TABLE_Y + HEAD_H + (NROWS + 1) * ROW_H + 7,
      };
      // the packet enters/exits the workflow card on the side facing the data
      // (horizontal: in the top, out the bottom; vertical: in & out the bottom).
      // packet is 130x52 in CSS, so 65 = half width.
      const CARD_CX = CARD.x + CARD.w / 2 - 65;
      const ENTER = VERT
        ? { x: CARD_CX, aboveY: CARD.y + CARD.h + 55, intoY: CARD.y + CARD.h - 45 }
        : { x: CARD_CX, aboveY: CARD.y - 65,          intoY: CARD.y + 18 };
      const EXIT = VERT
        ? { x: CARD_CX, insideY: CARD.y + CARD.h - 45, belowY: CARD.y + CARD.h + 55 }
        : { x: CARD_CX, insideY: CARD.y + CARD.h - 72, belowY: CARD.y + CARD.h + 12 };
      const FEATURE_W = (COLS.length - 1) * CELL_W;          // span of feature cols
      function featureRowY(r) { return TABLE_Y + HEAD_H + r * ROW_H; }
      // where the returning packet lands: centred over the .pred column / data rows
      // (packet is 130x52 in CSS, so 65/26 = half width/height)
      const PRED_LAND = {
        x: TABLE_X + PRED_COL * CELL_W + CELL_W / 2 - 65,
        y: featureRowY(0) + (NROWS * ROW_H) / 2 - 26,
      };

      function fly(el, x, y, dur, cb) {
        TM.anime({
          targets: el, translateX: x, translateY: y,
          duration: dur, easing: 'easeInOutCubic',
          complete: cb,
        });
      }

      // ---- small element builders -------------------------------------------
      // packet positioned via anime translateX/Y (never node()'s `translate()`
      // shorthand — anime can't parse it and would double the offset)
      function makePacket(x, y, text) {
        const stage = document.getElementById('orb-stage');
        const pkt = document.createElement('div');
        pkt.className = 'orb-node orb-packet';
        pkt.textContent = text;
        stage.appendChild(pkt);
        rt.els.push(pkt);
        rt.packet = pkt;
        anime.set(pkt, { translateX: x, translateY: y });
        return pkt;
      }
      // ghost copies of each data row drop into the packet ("collecting" the data)
      function collectRows() {
        const stage = document.getElementById('orb-stage');
        for (let r = 0; r < NROWS; r++) {
          const g = document.createElement('div');
          g.className = 'orb-node orb-ghost';
          g.style.width = FEATURE_W + 'px';
          g.style.height = (ROW_H - 12) + 'px';
          stage.appendChild(g);
          rt.els.push(g);
          anime.set(g, { translateX: TABLE_X, translateY: featureRowY(r) + 6, opacity: 0, scale: 1 });
          TM.anime({
            targets: g,
            keyframes: [
              { opacity: 0.85, duration: 140 },                                   // light up the row
              { translateX: PKT.startX, translateY: PKT.startY, scale: 0.25, opacity: 0, duration: 480 },
            ],
            delay: r * 70,
            easing: 'easeInOutQuad',
          });
        }
      }

      // a gear that spins while the workflow "thinks". Position via CSS left/top so
      // anime owns ONLY rotate (mixing with a translate() shorthand would break it).
      function showGear() {
        if (rt.gear) return;                       // idempotent
        const stage = document.getElementById('orb-stage');
        const gear = document.createElement('div');
        gear.className = 'orb-gear';
        gear.textContent = '⚙';
        gear.style.left = (CARD.x + CARD.w - 44) + 'px';
        gear.style.top = (CARD.y + 8) + 'px';
        gear.style.opacity = 0;
        stage.appendChild(gear);
        rt.gear = gear;
        rt.els.push(gear);
        TM.anime({ targets: gear, opacity: 1, duration: 250, easing: 'easeOutQuad' });
        // infinite spin: BARE anime (not TM.anime) so it never pins the busy counter
        rt.gearSpin = anime({ targets: gear, rotate: '360deg', duration: 1700, loop: true, easing: 'linear' });
      }
      function removeGear() {
        if (!rt.gear) return;
        anime.remove(rt.gear);
        rt.gear.remove();
        const i = rt.els.indexOf(rt.gear); if (i >= 0) rt.els.splice(i, 1);
        rt.gear = null; rt.gearSpin = null;
      }

      function fillPred() {
        predSpans.forEach((s, i) => { s.textContent = PRED_VALS[i]; });
        TM.anime({
          targets: predSpans, opacity: [0, 1],
          duration: 350, delay: anime.stagger(80), easing: 'easeOutQuad',
        });
      }
      function emptyPred() {
        anime.remove(predSpans);
        predSpans.forEach((s) => { s.style.opacity = 0; s.textContent = ''; });
      }
      function clearAll() {
        anime.remove(rt.els);
        rt.els.forEach((el) => el.remove());
        rt.els = [];
        rt.packet = null;
        rt.gear = null; rt.gearSpin = null;
        if (cardEl) cardEl.classList.remove('orb-scoring');
        emptyPred();
      }

      // ---- phase transitions -------------------------------------------------
      // forward single steps animate; back-nav and deep-link jumps snap instantly
      // (idempotent: each branch fully defines the target visual state).
      function snapTo(phase) {
        rt.token++;
        clearAll();
        rt.phase = phase;
        if (phase === 0) return;
        if (phase === 1) {
          // data has entered the workflow and is being computed (no visible packet)
          cardEl.classList.add('orb-scoring');
          showGear();
        } else if (phase === 2) {
          predSpans.forEach((s, i) => { s.textContent = PRED_VALS[i]; s.style.opacity = 1; });
        }
      }

      function animateOut() {          // phase 0 -> 1
        rt.phase = 1;
        const gen = ++rt.token, live = () => rt.token === gen;
        // packet appears as a staging tray below the table, then the rows collect
        // into it before it departs for the R session
        const pkt = makePacket(PKT.startX, PKT.startY, 'data');
        pkt.style.opacity = 0;
        TM.anime({ targets: pkt, opacity: 1, scale: [0.8, 1], duration: 320, easing: 'easeOutBack' });
        collectRows();
        const COLLECT_MS = (NROWS - 1) * 70 + 140 + 480 + 120;   // last ghost lands + beat
        TM.pause(COLLECT_MS, () => {
          if (!live()) return;
          // travel to the R session, then enter the workflow at the top
          fly(pkt, ENTER.x, ENTER.aboveY, 950, () => {
            if (!live()) return;
            cardEl.classList.add('orb-scoring');
            showGear();
            TM.anime({
              targets: pkt, translateY: ENTER.intoY, opacity: [1, 0],
              duration: 450, easing: 'easeInQuad',
              complete: () => {
                if (!live()) return;
                pkt.remove();
                const i = rt.els.indexOf(pkt); if (i >= 0) rt.els.splice(i, 1);
                rt.packet = null;
              },
            });
          });
        });
      }

      function animateBack() {         // phase 1 -> 2
        rt.phase = 2;
        const gen = ++rt.token, live = () => rt.token === gen;
        cardEl.classList.remove('orb-scoring');
        removeGear();
        // prediction emerges from the bottom of the workflow, then travels back
        const pkt = makePacket(EXIT.x, EXIT.insideY, '+ .pred');
        pkt.style.opacity = 0;
        TM.anime({
          targets: pkt, translateY: EXIT.belowY, opacity: [0, 1],
          duration: 380, easing: 'easeOutQuad',
          complete: () => {
            if (!live()) return;
            fly(pkt, PRED_LAND.x, PRED_LAND.y, 950, () => {
              if (!live()) return;
              TM.anime({ targets: pkt, opacity: 0, duration: 250, easing: 'easeOutQuad' });
              fillPred();
            });
          },
        });
      }

      function render(stage) {
        if (!build()) return;
        const target = stage >= 2 ? 2 : (stage >= 1 ? 1 : 0);
        if (target === rt.phase) return;
        if (target - rt.phase === 1) {     // single forward step -> animate
          if (target === 1) animateOut(); else animateBack();
        } else {                            // back-nav or multi-step jump -> snap
          snapTo(target);
        }
      }

      TM.gate({
        markerClass: 'orb-slide',
        fragmentIds: ['orb-rt-out', 'orb-rt-back'],
        render,
      });
    })();
    </script>
    <script id="quarto-html-after-body" type="application/javascript">
      window.document.addEventListener("DOMContentLoaded", function (event) {
        const tabsets =  window.document.querySelectorAll(".panel-tabset-tabby")
        tabsets.forEach(function(tabset) {

          for (const clz of el.classList) {
            if (clz.startsWith('code-annotation-')) {                     
              return true;
            }
          }
          return false;
        }
        const onCopySuccess = function(e) {
          // button target
          const button = e.trigger;
          // don't keep focus
          button.blur();
          // flash "checked"
          button.classList.add('code-copy-button-checked');
          var currentTitle = button.getAttribute("title");
          button.setAttribute("title", "Copied!");
          let tooltip;
          if (window.bootstrap) {
            button.setAttribute("data-bs-toggle", "tooltip");
            button.setAttribute("data-bs-placement", "left");
            button.setAttribute("data-bs-title", "Copied!");
            tooltip = new bootstrap.Tooltip(button, 
              { trigger: "manual", 
                customClass: "code-copy-button-tooltip",
                offset: [0, -8]});
            tooltip.show();    
          }
          setTimeout(function() {
            if (tooltip) {
              tooltip.hide();
              button.removeAttribute("data-bs-title");
              button.removeAttribute("data-bs-toggle");
              button.removeAttribute("data-bs-placement");
            }
            button.setAttribute("title", currentTitle);
            button.classList.remove('code-copy-button-checked');
          }, 1000);
          // clear code selection
          e.clearSelection();
        }
        const getTextToCopy = function(trigger) {
          const outerScaffold = trigger.parentElement.cloneNode(true);
          const codeEl = outerScaffold.querySelector('code');
          for (const childEl of codeEl.children) {
            if (isCodeAnnotation(childEl)) {
              childEl.remove();
            }
          }
          return codeEl.innerText;
        }
        const clipboard = new window.ClipboardJS('.code-copy-button:not([data-in-quarto-modal])', {
          text: getTextToCopy
        });
        clipboard.on('success', onCopySuccess);
        if (window.document.getElementById('quarto-embedded-source-code-modal')) {
          const clipboardModal = new window.ClipboardJS('.code-copy-button[data-in-quarto-modal]', {
            text: getTextToCopy,
            container: window.document.getElementById('quarto-embedded-source-code-modal')
          });
          clipboardModal.on('success', onCopySuccess);
        }
          var localhostRegex = new RegExp(/^(?:http|https):\/\/localhost\:?[0-9]*\//);
          var mailtoRegex = new RegExp(/^mailto:/);
            var filterRegex = new RegExp('/' + window.location.host + '/');
          var isInternal = (href) => {
              return filterRegex.test(href) || localhostRegex.test(href) || mailtoRegex.test(href);
          }
          // Inspect non-navigation links and adorn them if external
         var links = window.document.querySelectorAll('a[href]:not(.nav-link):not(.navbar-brand):not(.toc-action):not(.sidebar-link):not(.sidebar-item-toggle):not(.pagination-link):not(.no-external):not([aria-hidden]):not(.dropdown-item):not(.quarto-navigation-tool):not(.about-link)');
          for (var i=0; i<links.length; i++) {
            const link = links[i];
            if (!isInternal(link.href)) {
              // undo the damage that might have been done by quarto-nav.js in the case of
              // links that we want to consider external
              if (link.dataset.originalHref !== undefined) {
                link.href = link.dataset.originalHref;
              }
            }
          }
        function tippyHover(el, contentFn, onTriggerFn, onUntriggerFn) {
          const config = {
            allowHTML: true,
            maxWidth: 500,
            delay: 100,
            arrow: false,
            appendTo: function(el) {
                return el.closest('section.slide') || el.parentElement;
            },
            interactive: true,
            interactiveBorder: 10,
            theme: 'light-border',
            placement: 'bottom-start',
          };
          if (contentFn) {
            config.content = contentFn;
          }
          if (onTriggerFn) {
            config.onTrigger = onTriggerFn;
          }
          if (onUntriggerFn) {
            config.onUntrigger = onUntriggerFn;
          }
            config['offset'] = [0,0];
            config['maxWidth'] = 700;
          window.tippy(el, config); 
        }
        const noterefs = window.document.querySelectorAll('a[role="doc-noteref"]');
        for (var i=0; i<noterefs.length; i++) {
          const ref = noterefs[i];
          tippyHover(ref, function() {
            // use id or data attribute instead here
            let href = ref.getAttribute('data-footnote-href') || ref.getAttribute('href');
            try { href = new URL(href).hash; } catch {}
            const id = href.replace(/^#\/?/, "");
            const note = window.document.getElementById(id);
            if (note) {
              return note.innerHTML;
            } else {
              return "";
            }
          });
        }
        const findCites = (el) => {
          const parentEl = el.parentElement;
          if (parentEl) {
            const cites = parentEl.dataset.cites;
            if (cites) {
              return {
                el,
                cites: cites.split(' ')
              };
            } else {
              return findCites(el.parentElement)
            }
          } else {
            return undefined;
          }
        };
        var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
        for (var i=0; i<bibliorefs.length; i++) {
          const ref = bibliorefs[i];
          const citeInfo = findCites(ref);
          if (citeInfo) {
            tippyHover(citeInfo.el, function() {
              var popup = window.document.createElement('div');
              citeInfo.cites.forEach(function(cite) {
                var citeDiv = window.document.createElement('div');
                citeDiv.classList.add('hanging-indent');
                citeDiv.classList.add('csl-entry');
                var biblioDiv = window.document.getElementById('ref-' + cite);
                if (biblioDiv) {
                  citeDiv.innerHTML = biblioDiv.innerHTML;
                }
                popup.appendChild(citeDiv);
              });
              return popup.innerHTML;
            });
          }
        }
      });
      </script>
