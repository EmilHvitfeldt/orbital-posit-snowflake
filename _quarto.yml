project:
  type: website
  # render into docs/ so GitHub Pages can serve from the main branch /docs folder
  output-dir: docs
  # only render the decks + landing page (not README.md / PLAN.md)
  render:
    - "*.qmd"
  resources:
    # keep .nojekyll in docs/ so Pages serves the site_libs/ assets verbatim
    - .nojekyll

website:
  title: "orbital + Snowflake"

format:
  revealjs:
    theme: [default, css/demos.css]
    width: 1280
    height: 720
    transition: fade
    controls: true
    progress: true
    hash: true
    # anime.js (pinned to v3 — v4 changed the timeline API)
    include-in-header:
      text: |
        <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    # shared infrastructure (coord conversion, fragment gating) loads first;
    # each deck adds its own animation module via its own include-after-body.
    include-after-body:
      - js/infra.html
  html:
    theme: cosmo
    toc: false
