project:
  type: website
  # render into docs/ so GitHub Pages can serve from the main branch /docs folder
  output-dir: docs
  # only render the decks + landing page (not README.md / PLAN.md)
  render:
    - "*.qmd"
  resources:
    # keep .nojekyll in docs/ so Pages serves the site_libs/ assets verbatim
    - .nojekyll
    # vendored anime.js (referenced by URL from the header include, so it must be
    # copied into docs/ verbatim rather than inlined)
    - js/anime.min.js
    # Posit Workbench logo, referenced by URL from the session header chip
    - js/posit-workbench.svg
    # captured GIF/MP4 recordings of each deck, offered as download links on the
    # landing page
    - assets/

website:
  title: "orbital + Snowflake"

format:
  revealjs:
    theme: [default, css/demos.css]
    width: 1280
    height: 720
    transition: fade
    controls: true
    progress: true
    hash: true
    # anime.js (pinned to v3 — v4 changed the timeline API). Vendored locally so
    # the decks are self-contained and render offline / survive a CDN outage.
    include-in-header:
      text: |
        <script src="js/anime.min.js"></script>
    # shared infrastructure loads first (coord conversion, fragment gating), then
    # the shared build/layout base; each deck adds its own animation module via
    # its own include-after-body.
    include-after-body:
      - js/infra.html
      - js/orbital-base.html
      # shared deck navigation: Home link + before -> after completion CTA
      - js/orbital-nav.html
  html:
    theme: cosmo
    toc: false
