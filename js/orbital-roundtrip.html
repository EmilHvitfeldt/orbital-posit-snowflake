<script>
/* ---- orbital + Snowflake: round-trip vs. in-place ----
 * Marker slide: .orb-slide   Stage container: #orb-stage  (1180 x 600)
 * render(stage) is idempotent (stage = number of visible gating fragments).
 *
 * Stage 0 (this build): the static starting actors —
 *   - trained-model card on the left
 *   - Snowflake panel on the right holding a data table whose .pred column
 *     is reserved (dashed/blue) but empty, waiting to be filled later.
 */
(function () {
  const W = 1180, H = 600;
  const BLUE = window.ORB_SNOWFLAKE || '#29B5E8';
  const RBLUE = window.ORB_RSESSION || '#276DC3';
  const MODEL_LABEL = window.ORB_MODEL_LABEL || 'workflow()';
  // Posit framing: the R session runs *inside* Snowflake (Posit Team Native App
  // in Snowpark Container Services), so the data never leaves the warehouse.
  const POSIT = !!window.ORB_POSIT;
  const SESSION_LABEL = window.ORB_SESSION_LABEL || (POSIT ? 'Posit Workbench' : 'R session');
  const SESSION_LOGO = window.ORB_SESSION_LOGO || 'R';
  // Orientation: horizontal (session beside Snowflake) or vertical (session on
  // top, data table on the bottom; portrait canvas).
  const VERT = (window.ORB_ORIENT === 'vertical');
  const STAGE_W = VERT ? 820 : 1180;
  const STAGE_H = VERT ? 1080 : 600;

  // ---- outer Snowflake container (only drawn in Posit framing) ----
  const SF = VERT ? { x: 60, y: 40, w: 700, h: 1000 }
                  : { x: 30, y: 40, w: 1120, h: 540 };

  // ---- session panel: beside (horizontal) or above (vertical) the data ----
  const RPANEL = VERT
    ? (POSIT ? { x: 90,  y: 110, w: 640, h: 300 } : { x: 180, y: 40,  w: 460, h: 330 })
    : (POSIT ? { x: 58,  y: 112, w: 430, h: 430 } : { x: 40,  y: 65,  w: 440, h: 470 });

  // ---- trained-model card, centred inside the session panel ----
  const CARD = { w: 230, h: 150 };
  CARD.x = RPANEL.x + (RPANEL.w - CARD.w) / 2;
  CARD.y = RPANEL.y + 90 + (VERT ? 0 : 60);   // below the header

  // ---- PANEL drives the data-table position (own panel / SF region) ----
  const PANEL = VERT
    ? (POSIT ? { x: 90,  y: 560, w: 640, h: 430 } : { x: 180, y: 600, w: 460, h: 430 })
    : (POSIT ? { x: 620, y: 62,  w: 470, h: 470 } : { x: 700, y: 65,  w: 440, h: 470 });

  // ---- data table inside the panel (flat, recipe-style) ----
  const COLS = ['id', 'x1', 'x2', 'x3', '.pred'];
  const PRED_COL = COLS.length - 1;
  const CELL_W = 72, HEAD_H = 40, ROW_H = 40;        // contiguous columns
  const NROWS = 6;                                   // data rows (excl. header)
  const TABLE_W = COLS.length * CELL_W;
  const TABLE_X = PANEL.x + (PANEL.w - TABLE_W) / 2;
  const TABLE_Y = PANEL.y + 90;
  // the data rows + the "more rows" ⋮ row scroll inside a clipped viewport that
  // sits just below the (fixed) header row.
  const VIEW_H = (NROWS + 1) * ROW_H;

  // hardcoded sample values (rolled once, stable) for the feature columns
  const DATA = [
    [1, 0.42, 1.7, 'A'],
    [2, 0.91, 0.3, 'B'],
    [3, 0.18, 2.4, 'A'],
    [4, 0.66, 1.1, 'C'],
    [5, 0.37, 0.8, 'B'],
    [6, 0.74, 1.9, 'A'],
  ];

  // predicted values that fill the .pred column (hardcoded, stable)
  const PRED_VALS = ['0.81', '0.34', '0.92', '0.45', '0.27', '0.68'];
  // a fresh batch of rows waiting below the fold — each new batch must make the
  // whole round trip again (wake the session, ship the rows, score, ship back).
  const NEW_DATA = [
    [7,  0.55, 1.2, 'C'],
    [8,  0.23, 2.1, 'A'],
    [9,  0.88, 0.6, 'B'],
    [10, 0.49, 1.5, 'C'],
    [11, 0.31, 0.9, 'A'],
    [12, 0.70, 2.2, 'B'],
  ];
  const NEW_PRED_VALS = ['0.59', '0.41', '0.77', '0.52', '0.30', '0.64'];

  let built = false;
  let cardEl = null;            // the trained-model card (pulsed while "scoring")
  let scrollerEl = null;        // inner scroller holding all body rows
  let rpanelEl = null;          // session panel box (glows while it works)
  let statusEl = null;          // session status pill ("running" / "idle")
  let statusText = null;        // its text node
  const predSpans = [];         // .pred spans for the first batch (fade in)
  const predSpans2 = [];        // .pred spans for the freshly-scrolled batch
  // round-trip state machine:
  //   0 = nothing  1 = data sent to R + scoring  2 = prediction returned
  //   3 = new batch sent (session re-woken + scoring)  4 = new prediction returned
  // token invalidates pending chained callbacks when we change phase mid-flight.
  let rt = { phase: 0, els: [], token: 0, packet: null, gear: null, gearSpin: null };

  function node(cls, x, y, parent) {
    const el = document.createElement('div');
    el.className = 'orb-node ' + cls;
    el.style.transform = `translate(${x}px, ${y}px)`;
    parent.appendChild(el);
    return el;
  }

  // row 0 = header; data rows 1..NROWS; dots row at NROWS+1
  function cellXY(col, row) {
    return {
      x: TABLE_X + col * CELL_W,
      y: TABLE_Y + (row === 0 ? 0 : HEAD_H + (row - 1) * ROW_H),
    };
  }
  // body cells live inside the scroller, so their coords are relative to it
  function bodyCellXY(col, idx) {
    return { x: col * CELL_W, y: idx * ROW_H };
  }
  function sizeCell(el, isHead) {
    el.style.width = CELL_W + 'px';
    el.style.height = (isHead ? HEAD_H : ROW_H) + 'px';
  }

  function build() {
    const stage = document.getElementById('orb-stage');
    if (!stage || built) return !!stage;
    built = true;
    stage.style.width = STAGE_W + 'px';
    stage.style.height = STAGE_H + 'px';
    stage.style.setProperty('--orb-blue', BLUE);
    stage.style.setProperty('--orb-rblue', RBLUE);

    // Posit framing: outer Snowflake container that holds everything
    if (POSIT) {
      const sf = node('orb-snowflake', SF.x, SF.y, stage);
      sf.style.width = SF.w + 'px';
      sf.style.height = SF.h + 'px';
    }

    // R-session panel (left, or nested inside the SF container in Posit)
    const rpanel = node('orb-rsession', RPANEL.x, RPANEL.y, stage);
    rpanelEl = rpanel;
    rpanel.style.width = RPANEL.w + 'px';
    rpanel.style.height = RPANEL.h + 'px';
    const rheader = node('orb-rsession-header', RPANEL.x + 24, RPANEL.y + 22, stage);
    const rlogo = document.createElement('span');
    rlogo.className = 'orb-rlogo';
    rlogo.textContent = SESSION_LOGO;
    const rlabel = document.createElement('span');
    rlabel.textContent = SESSION_LABEL;
    // a persistent "running" status: this approach needs a live R session
    const status = document.createElement('span');
    status.className = 'orb-status';
    statusEl = status;
    const dot = document.createElement('span');
    dot.className = 'orb-status-dot';
    status.appendChild(dot);
    statusText = document.createTextNode('running');
    status.appendChild(statusText);
    rheader.appendChild(rlogo);
    rheader.appendChild(rlabel);
    rheader.appendChild(status);

    // model card (inside the R-session panel)
    const card = node('orb-card', CARD.x, CARD.y, stage);
    cardEl = card;
    card.style.width = CARD.w + 'px';
    card.style.height = CARD.h + 'px';
    const ct = document.createElement('div');
    ct.className = 'orb-card-title';
    ct.textContent = 'Trained model';
    const cc = document.createElement('div');
    cc.className = 'orb-card-code';
    cc.textContent = MODEL_LABEL;
    card.appendChild(ct);
    card.appendChild(cc);

    // Snowflake: a standalone panel (non-Posit), or the outer container (Posit)
    // where the data table gets its own nested "Database" box that mirrors the
    // Workbench box — both live inside the Snowflake account (Database = where
    // tables physically sit, the storage counterpart to the compute session).
    if (!POSIT) {
      const panel = node('orb-snowflake', PANEL.x, PANEL.y, stage);
      panel.style.width = PANEL.w + 'px';
      panel.style.height = PANEL.h + 'px';
    } else {
      const db = node('orb-database', PANEL.x, PANEL.y, stage);
      db.style.width = PANEL.w + 'px';
      db.style.height = PANEL.h + 'px';
      const dbh = node('orb-database-header', PANEL.x + 24, PANEL.y + 22, stage);
      const dbicon = document.createElement('span');
      dbicon.className = 'orb-dbicon';
      const dblabel = document.createElement('span');
      dblabel.textContent = 'Database';
      dbh.appendChild(dbicon);
      dbh.appendChild(dblabel);
    }
    const hX = POSIT ? SF.x + 26 : PANEL.x + 24;
    const hY = POSIT ? SF.y + 16 : PANEL.y + 22;
    const header = node('orb-snowflake-header', hX, hY, stage);
    const flake = document.createElement('span');
    flake.className = 'orb-flake';
    flake.textContent = '❄';   // ❄
    const hlabel = document.createElement('span');
    hlabel.textContent = 'Snowflake';
    header.appendChild(flake);
    header.appendChild(hlabel);

    // header row (fixed — stays put while the body scrolls beneath it)
    COLS.forEach((name, c) => {
      const { x, y } = cellXY(c, 0);
      const cls = 'orb-cell orb-head' + (c === PRED_COL ? ' orb-pred' : '');
      const cell = node(cls, x, y, stage);
      sizeCell(cell, true);
      cell.textContent = name;
    });

    // clipped viewport (below the header) + inner scroller for the body rows
    const view = node('orb-tableview', TABLE_X, TABLE_Y + HEAD_H, stage);
    view.style.width = TABLE_W + 'px';
    view.style.height = VIEW_H + 'px';
    const scroller = document.createElement('div');
    scroller.className = 'orb-scroller';
    view.appendChild(scroller);
    scrollerEl = scroller;
    anime.set(scroller, { translateY: 0 });   // never via the translate() shorthand

    // one body row of cells; predList collects the .pred spans (start empty)
    function buildRow(rowData, idx, predList) {
      for (let c = 0; c < COLS.length; c++) {
        const { x, y } = bodyCellXY(c, idx);
        if (c === PRED_COL) {
          const cell = node('orb-cell orb-pred', x, y, scroller);
          sizeCell(cell, false);
          const span = document.createElement('span');
          span.style.opacity = 0;           // value fades in when filled
          cell.appendChild(span);
          predList.push(span);
        } else {
          const cell = node('orb-cell', x, y, scroller);
          sizeCell(cell, false);
          cell.textContent = rowData[c];
        }
      }
    }
    function buildDots(idx) {
      COLS.forEach((name, c) => {
        const { x, y } = bodyCellXY(c, idx);
        const cell = node('orb-cell orb-dots', x, y, scroller);
        sizeCell(cell, false);
        cell.textContent = '⋮';
      });
    }

    // batch 1 (visible) + its trailing ⋮, then batch 2 (new data, below the
    // fold) + its own ⋮ — exactly one page apart so a one-page scroll swaps them.
    for (let r = 0; r < NROWS; r++) buildRow(DATA[r], r, predSpans);
    buildDots(NROWS);
    for (let r = 0; r < NROWS; r++) buildRow(NEW_DATA[r], NROWS + 1 + r, predSpans2);
    buildDots(2 * NROWS + 1);

    // Posit: a dashed divider marking the runtime boundary the data crosses
    // inside Snowflake (vertical line horizontally; horizontal line vertically)
    if (POSIT) {
      if (VERT) {
        const by = (RPANEL.y + RPANEL.h + TABLE_Y) / 2;
        const bd = node('orb-boundary-h', TABLE_X - 10, by, stage);
        bd.style.width = (TABLE_W + 20) + 'px';
      } else {
        const bx = (RPANEL.x + RPANEL.w + TABLE_X) / 2;
        const bd = node('orb-boundary', bx, TABLE_Y - 10, stage);
        bd.style.height = (HEAD_H + (NROWS + 1) * ROW_H + 20) + 'px';
      }
    }
    return true;
  }

  // ---- stage 1: the round-trip (data leaves Snowflake, gets scored in the R
  // session, predictions travel back, .pred fills). The double traversal across
  // the lane is what sells "slow". -----------------------------------------
  // packet's pickup/staging spot near the table: below it (horizontal) or above
  // it toward the session (vertical). Derived so it follows the layout.
  const PKT = {
    startX: TABLE_X + TABLE_W / 2 - 65,
    startY: VERT ? TABLE_Y - 72
                 : TABLE_Y + HEAD_H + (NROWS + 1) * ROW_H + 7,
  };
  // the packet enters/exits the workflow card on the side facing the data
  // (horizontal: in the top, out the bottom; vertical: data in the LEFT edge,
  // predictions out the RIGHT edge). packet is 130x52 in CSS, so 65/26 = half
  // width/height. Each side has a staging point (sx,sy) and an into/out-of-card
  // point (ix,iy / ox,oy); both axes are tweened so one set of code serves both
  // orientations (the unchanged axis is a no-op).
  const CARD_CX = CARD.x + CARD.w / 2 - 65;
  const CARD_CY = CARD.y + CARD.h / 2 - 26;     // packet centred on the card row
  const ENTER = VERT
    ? { sx: CARD.x - 150, sy: CARD_CY,            ix: CARD.x - 30,          iy: CARD_CY }
    : { sx: CARD_CX,      sy: CARD.y - 65,        ix: CARD_CX,              iy: CARD.y + 18 };
  const EXIT = VERT
    ? { sx: CARD.x + CARD.w - 110, sy: CARD_CY,            ox: CARD.x + CARD.w + 10, oy: CARD_CY }
    : { sx: CARD_CX,               sy: CARD.y + CARD.h - 72, ox: CARD_CX,            oy: CARD.y + CARD.h + 12 };
  const FEATURE_W = (COLS.length - 1) * CELL_W;          // span of feature cols
  function featureRowY(r) { return TABLE_Y + HEAD_H + r * ROW_H; }
  // where the returning packet lands: centred over the .pred column / data rows
  // (packet is 130x52 in CSS, so 65/26 = half width/height)
  const PRED_LAND = {
    x: TABLE_X + PRED_COL * CELL_W + CELL_W / 2 - 65,
    y: featureRowY(0) + (NROWS * ROW_H) / 2 - 26,
  };

  function fly(el, x, y, dur, cb) {
    TM.anime({
      targets: el, translateX: x, translateY: y,
      duration: dur, easing: 'easeInOutCubic',
      complete: cb,
    });
  }

  // ---- small element builders -------------------------------------------
  // packet positioned via anime translateX/Y (never node()'s `translate()`
  // shorthand — anime can't parse it and would double the offset)
  function makePacket(x, y, text) {
    const stage = document.getElementById('orb-stage');
    const pkt = document.createElement('div');
    pkt.className = 'orb-node orb-packet';
    pkt.textContent = text;
    stage.appendChild(pkt);
    rt.els.push(pkt);
    rt.packet = pkt;
    anime.set(pkt, { translateX: x, translateY: y });
    return pkt;
  }
  // ghost copies of each data row drop into the packet ("collecting" the data).
  // ghosts are FEATURE_W wide and scale down around their own centre, so to land
  // *inside* the 130x52 packet we target the packet's centre, not its left edge.
  const GHOST_LAND = {
    x: PKT.startX + 65 - FEATURE_W / 2,
    y: PKT.startY + 26 - (ROW_H - 12) / 2,
  };
  function collectRows() {
    const stage = document.getElementById('orb-stage');
    for (let r = 0; r < NROWS; r++) {
      const g = document.createElement('div');
      g.className = 'orb-node orb-ghost';
      g.style.width = FEATURE_W + 'px';
      g.style.height = (ROW_H - 12) + 'px';
      stage.appendChild(g);
      rt.els.push(g);
      anime.set(g, { translateX: TABLE_X, translateY: featureRowY(r) + 6, opacity: 0, scale: 1 });
      TM.anime({
        targets: g,
        keyframes: [
          { opacity: 0.85, duration: 140 },                                   // light up the row
          { translateX: GHOST_LAND.x, translateY: GHOST_LAND.y, scale: 0.25, opacity: 0, duration: 480 },
        ],
        delay: r * 70,
        easing: 'easeInOutQuad',
      });
    }
  }

  // reverse of collectRows: ghosts grow back out of the packet onto each data
  // row, as if the collected rows were being put back where they came from.
  function releaseRows() {
    const stage = document.getElementById('orb-stage');
    for (let r = 0; r < NROWS; r++) {
      const g = document.createElement('div');
      g.className = 'orb-node orb-ghost';
      g.style.width = FEATURE_W + 'px';
      g.style.height = (ROW_H - 12) + 'px';
      stage.appendChild(g);
      rt.els.push(g);
      anime.set(g, { translateX: GHOST_LAND.x, translateY: GHOST_LAND.y, scale: 0.25, opacity: 0 });
      TM.anime({
        targets: g,
        keyframes: [
          { translateX: TABLE_X, translateY: featureRowY(r) + 6, scale: 1, opacity: 0.85, duration: 480 },
          { opacity: 0, duration: 140 },                                    // settle back into the row
        ],
        delay: r * 70,
        easing: 'easeInOutQuad',
      });
    }
  }

  // a gear that spins while the workflow "thinks". Position via CSS left/top so
  // anime owns ONLY rotate (mixing with a translate() shorthand would break it).
  function showGear() {
    if (rt.gear) return;                       // idempotent
    const stage = document.getElementById('orb-stage');
    const gear = document.createElement('div');
    gear.className = 'orb-gear';
    gear.textContent = '⚙';
    gear.style.left = (CARD.x + CARD.w - 44) + 'px';
    gear.style.top = (CARD.y + 8) + 'px';
    gear.style.opacity = 0;
    stage.appendChild(gear);
    rt.gear = gear;
    rt.els.push(gear);
    TM.anime({ targets: gear, opacity: 1, duration: 250, easing: 'easeOutQuad' });
    // infinite spin: BARE anime (not TM.anime) so it never pins the busy counter
    rt.gearSpin = anime({ targets: gear, rotate: '360deg', duration: 1700, loop: true, easing: 'linear' });
  }
  function removeGear() {
    if (!rt.gear) return;
    anime.remove(rt.gear);
    rt.gear.remove();
    const i = rt.els.indexOf(rt.gear); if (i >= 0) rt.els.splice(i, 1);
    rt.gear = null; rt.gearSpin = null;
  }

  function fillPred(spans, vals) {
    spans.forEach((s, i) => { s.textContent = vals[i]; });
    TM.anime({
      targets: spans, opacity: [0, 1],
      duration: 350, delay: anime.stagger(80), easing: 'easeOutQuad',
    });
  }
  function emptyPred(spans) {
    anime.remove(spans);
    spans.forEach((s) => { s.style.opacity = 0; s.textContent = ''; });
  }

  // the round trip needs a live session: it sits idle between batches and must
  // be woken (and kept warm) to score each new batch — the cost orbital avoids.
  function goIdle() {
    statusEl.classList.add('orb-status-off');
    statusText.textContent = 'idle';
    rpanelEl.classList.remove('orb-rsession-busy');
  }
  function wakeUp() {
    statusEl.classList.remove('orb-status-off');
    statusText.textContent = 'running';
  }
  // card + panel light up while the session is actively scoring
  function showScoring() {
    cardEl.classList.add('orb-scoring');
    rpanelEl.classList.add('orb-rsession-busy');
    showGear();
  }
  // one-page scroll that swaps batch 1 for the fresh batch below it
  const SCROLL_Y = VIEW_H;

  function clearAll() {
    anime.remove(rt.els);
    rt.els.forEach((el) => el.remove());
    rt.els = [];
    rt.packet = null;
    rt.gear = null; rt.gearSpin = null;
    if (cardEl) cardEl.classList.remove('orb-scoring');
    emptyPred(predSpans);
    emptyPred(predSpans2);
    if (scrollerEl) { anime.remove(scrollerEl); anime.set(scrollerEl, { translateY: 0 }); }
    // back to the default "running" session (idle/wake states are phase-specific)
    statusEl.classList.remove('orb-status-off');
    statusText.textContent = 'running';
    rpanelEl.classList.remove('orb-rsession-busy');
  }

  // ---- phase transitions -------------------------------------------------
  // forward single steps animate; back-nav and deep-link jumps snap instantly
  // (idempotent: each branch fully defines the target visual state).
  function snapTo(phase) {
    rt.token++;
    clearAll();
    rt.phase = phase;
    if (phase === 0) return;
    if (phase === 1) {
      // data has entered the workflow and is being computed (no visible packet)
      showScoring();
      return;
    }
    // phases 2-5 all have the first batch already scored, session idle
    predSpans.forEach((s, i) => { s.textContent = PRED_VALS[i]; s.style.opacity = 1; });
    if (phase === 2) { goIdle(); return; }      // round trip done, session idles
    // phases 3,4,5: scrolled down to the fresh batch
    anime.set(scrollerEl, { translateY: -SCROLL_Y });
    if (phase === 3) { goIdle(); return; }       // new rows revealed, still unscored
    if (phase === 4) {                           // new batch sent, session re-woken
      wakeUp();
      showScoring();
    } else {                                     // phase 5: new batch scored, idle
      predSpans2.forEach((s, i) => { s.textContent = NEW_PRED_VALS[i]; s.style.opacity = 1; });
      goIdle();
    }
  }

  // collect the currently-visible rows into a packet and ship it to the session,
  // which lights up and starts scoring. (Geometry is the same for either batch:
  // after the one-page scroll the new rows sit where the old ones were.)
  function sendData(phase) {
    rt.phase = phase;
    const gen = ++rt.token, live = () => rt.token === gen;
    const pkt = makePacket(PKT.startX, PKT.startY, 'data');
    pkt.style.opacity = 0;
    TM.anime({ targets: pkt, opacity: 1, scale: [0.8, 1], duration: 320, easing: 'easeOutBack' });
    collectRows();
    const COLLECT_MS = (NROWS - 1) * 70 + 140 + 480 + 120;   // last ghost lands + beat
    TM.pause(COLLECT_MS, () => {
      if (!live()) return;
      // travel to the session, then enter the workflow (top, or left edge in
      // vertical decks)
      fly(pkt, ENTER.sx, ENTER.sy, 950, () => {
        if (!live()) return;
        showScoring();
        TM.anime({
          targets: pkt, translateX: ENTER.ix, translateY: ENTER.iy, opacity: [1, 0],
          duration: 450, easing: 'easeInQuad',
          complete: () => {
            if (!live()) return;
            pkt.remove();
            const i = rt.els.indexOf(pkt); if (i >= 0) rt.els.splice(i, 1);
            rt.packet = null;
          },
        });
      });
    });
  }

  // the prediction packet emerges from the workflow, travels back, fills the
  // .pred column for that batch, and the session drops back to idle.
  function returnData(phase, spans, vals) {
    rt.phase = phase;
    const gen = ++rt.token, live = () => rt.token === gen;
    cardEl.classList.remove('orb-scoring');
    removeGear();
    const pkt = makePacket(EXIT.sx, EXIT.sy, '+ .pred');
    pkt.style.opacity = 0;
    TM.anime({
      targets: pkt, translateX: EXIT.ox, translateY: EXIT.oy, opacity: [0, 1],
      duration: 380, easing: 'easeOutQuad',
      complete: () => {
        if (!live()) return;
        fly(pkt, PRED_LAND.x, PRED_LAND.y, 950, () => {
          if (!live()) return;
          TM.anime({ targets: pkt, opacity: 0, duration: 250, easing: 'easeOutQuad' });
          fillPred(spans, vals);
          goIdle();      // work done -> the session idles until the next batch
        });
      },
    });
  }

  function animateOut() { sendData(1); }                         // phase 0 -> 1
  function animateBack() { returnData(2, predSpans, PRED_VALS); } // phase 1 -> 2

  function animateNewScroll() {    // phase 2 -> 3
    rt.phase = 3;
    // scroll down to a fresh batch of (still unscored) rows; session stays idle
    anime.remove(scrollerEl);
    TM.anime({ targets: scrollerEl, translateY: -SCROLL_Y, duration: 900, easing: 'easeInOutCubic' });
  }
  function animateNewOut() {       // phase 3 -> 4
    // wake the idle session back up and make the same round trip again
    wakeUp();
    sendData(4);
  }
  function animateNewBack() {      // phase 4 -> 5
    returnData(5, predSpans2, NEW_PRED_VALS);
  }

  // ---- reverse transitions: each mirrors the matching forward step so a single
  // back-nav plays the animation backwards instead of snapping. -------------
  // reverse of sendData: scoring stops, a data packet leaves the workflow and
  // travels back to the table, where the collected rows are released again.
  // idleAtEnd matches the target phase's session state (running vs. idle).
  function reverseSend(phase, idleAtEnd) {
    rt.phase = phase;
    const gen = ++rt.token, live = () => rt.token === gen;
    cardEl.classList.remove('orb-scoring');
    removeGear();
    rpanelEl.classList.remove('orb-rsession-busy');
    const pkt = makePacket(ENTER.ix, ENTER.iy, 'data');
    pkt.style.opacity = 0;
    TM.anime({
      targets: pkt, translateX: ENTER.sx, translateY: ENTER.sy, opacity: [0, 1],
      duration: 450, easing: 'easeOutQuad',
      complete: () => {
        if (!live()) return;
        fly(pkt, PKT.startX, PKT.startY, 950, () => {
          if (!live()) return;
          releaseRows();
          TM.anime({
            targets: pkt, opacity: 0, scale: 0.8, duration: 320, easing: 'easeInQuad',
            complete: () => {
              if (!live()) return;
              pkt.remove();
              const i = rt.els.indexOf(pkt); if (i >= 0) rt.els.splice(i, 1);
              rt.packet = null;
              if (idleAtEnd) goIdle();
            },
          });
        });
      },
    });
  }

  // reverse of returnData: predictions un-fill, the prediction packet lifts off
  // the table and travels back into the workflow, which resumes scoring.
  function reverseReturn(phase, spans) {
    rt.phase = phase;
    const gen = ++rt.token, live = () => rt.token === gen;
    anime.remove(spans);
    TM.anime({
      targets: spans, opacity: [1, 0], duration: 300, easing: 'easeInQuad',
      complete: () => { if (live()) spans.forEach((s) => { s.textContent = ''; }); },
    });
    const pkt = makePacket(PRED_LAND.x, PRED_LAND.y, '+ .pred');
    pkt.style.opacity = 0;
    TM.anime({ targets: pkt, opacity: [0, 1], duration: 250, easing: 'easeOutQuad' });
    wakeUp();
    fly(pkt, EXIT.ox, EXIT.oy, 950, () => {
      if (!live()) return;
      TM.anime({
        targets: pkt, translateX: EXIT.sx, translateY: EXIT.sy, opacity: [1, 0],
        duration: 380, easing: 'easeInQuad',
        complete: () => {
          if (!live()) return;
          pkt.remove();
          const i = rt.els.indexOf(pkt); if (i >= 0) rt.els.splice(i, 1);
          rt.packet = null;
          showScoring();        // back to "computing" — the session is busy again
        },
      });
    });
  }

  function reverseNewScroll() {    // phase 3 -> 2
    rt.phase = 2;
    // scroll back up to the first (already-scored) batch; session stays idle
    anime.remove(scrollerEl);
    TM.anime({ targets: scrollerEl, translateY: 0, duration: 900, easing: 'easeInOutCubic' });
  }

  function render(stage) {
    if (!build()) return;
    const target = stage >= 5 ? 5
                 : stage >= 4 ? 4
                 : stage >= 3 ? 3
                 : stage >= 2 ? 2
                 : stage >= 1 ? 1 : 0;
    if (target === rt.phase) return;
    if (target - rt.phase === 1) {     // single forward step -> animate
      if (target === 1) animateOut();
      else if (target === 2) animateBack();
      else if (target === 3) animateNewScroll();
      else if (target === 4) animateNewOut();
      else animateNewBack();
    } else if (rt.phase - target === 1) { // single back step -> reverse animate
      if (rt.phase === 1) reverseSend(0, false);        // session was "running"
      else if (rt.phase === 2) reverseReturn(1, predSpans);
      else if (rt.phase === 3) reverseNewScroll();
      else if (rt.phase === 4) reverseSend(3, true);    // back to idle, unscored
      else reverseReturn(4, predSpans2);
    } else {                            // multi-step jump -> snap
      snapTo(target);
    }
  }

  TM.gate({
    markerClass: 'orb-slide',
    fragmentIds: ['orb-rt-out', 'orb-rt-back', 'orb-rt-newscroll', 'orb-rt-new-out', 'orb-rt-new-back'],
    render,
  });
})();
</script>
