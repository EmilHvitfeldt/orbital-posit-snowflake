<script>
/* ---- orbital + Snowflake: predictions IN PLACE ----
 * Marker slide: .orb-slide   Stage container: #orb-stage  (1180 x 600)
 * render(stage) is idempotent (stage = number of visible gating fragments).
 *
 * The contrast to orbital-roundtrip: instead of shipping data out to a live
 * session and back, orbital() compiles the model to SQL that runs in place
 * inside Snowflake — so the R session is no longer needed.
 *
 * Stage 0 (this build): the shared starting frame —
 *   - R session (left, "running") with the trained-model card
 *   - Snowflake panel (right) with a data table whose .pred column is empty.
 */
(function () {
  const BLUE = window.ORB_SNOWFLAKE || '#29B5E8';
  const RBLUE = window.ORB_RSESSION || '#276DC3';
  const MODEL_LABEL = window.ORB_MODEL_LABEL || 'workflow()';
  // Posit framing: the session runs *inside* Snowflake (Posit Team Native App).
  const POSIT = !!window.ORB_POSIT;
  const SESSION_LABEL = window.ORB_SESSION_LABEL || (POSIT ? 'Posit Workbench' : 'R session');
  const SESSION_LOGO = window.ORB_SESSION_LOGO || 'R';
  // Orientation: horizontal (session beside Snowflake) or vertical (session on
  // top, data table on the bottom; portrait canvas).
  const VERT = (window.ORB_ORIENT === 'vertical');
  const STAGE_W = VERT ? 820 : 1180;
  const STAGE_H = VERT ? 1080 : 600;

  // ---- outer Snowflake container (only drawn in Posit framing) ----
  const SF = VERT ? { x: 60, y: 40, w: 700, h: 1000 }
                  : { x: 30, y: 40, w: 1120, h: 540 };

  // ---- session panel: beside (horizontal) or above (vertical) the data ----
  const RPANEL = VERT
    ? (POSIT ? { x: 90,  y: 110, w: 640, h: 300 } : { x: 180, y: 40,  w: 460, h: 330 })
    : (POSIT ? { x: 58,  y: 112, w: 430, h: 430 } : { x: 40,  y: 65,  w: 440, h: 470 });

  // ---- trained-model card, centred inside the session panel ----
  const CARD = { w: 230, h: 150 };
  CARD.x = RPANEL.x + (RPANEL.w - CARD.w) / 2;
  CARD.y = RPANEL.y + 90 + (VERT ? 0 : 60);

  // ---- PANEL drives the data-table position (own panel / SF region) ----
  const PANEL = VERT
    ? (POSIT ? { x: 90,  y: 560, w: 640, h: 430 } : { x: 180, y: 600, w: 460, h: 430 })
    : (POSIT ? { x: 620, y: 62,  w: 470, h: 470 } : { x: 700, y: 65,  w: 440, h: 470 });

  // ---- data table inside the panel (flat) ----
  const COLS = ['id', 'x1', 'x2', 'x3', '.pred'];
  const PRED_COL = COLS.length - 1;
  const CELL_W = 72, HEAD_H = 40, ROW_H = 40;
  const NROWS = 6;
  const TABLE_W = COLS.length * CELL_W;
  const TABLE_X = PANEL.x + (PANEL.w - TABLE_W) / 2;
  const TABLE_Y = PANEL.y + (VERT ? 95 : 110);
  // the data rows + the "more rows" ⋮ row scroll inside a clipped viewport that
  // sits just below the (fixed) header row.
  const VIEW_H = (NROWS + 1) * ROW_H;

  const DATA = [
    [1, 0.42, 1.7, 'A'],
    [2, 0.91, 0.3, 'B'],
    [3, 0.18, 2.4, 'A'],
    [4, 0.66, 1.1, 'C'],
    [5, 0.37, 0.8, 'B'],
    [6, 0.74, 1.9, 'A'],
  ];
  const PRED_VALS = ['0.81', '0.34', '0.92', '0.45', '0.27', '0.68'];
  // a fresh batch of rows waiting below the fold — the same standing query
  // scores them once the table scrolls down to reveal them.
  const NEW_DATA = [
    [7,  0.55, 1.2, 'C'],
    [8,  0.23, 2.1, 'A'],
    [9,  0.88, 0.6, 'B'],
    [10, 0.49, 1.5, 'C'],
    [11, 0.31, 0.9, 'A'],
    [12, 0.70, 2.2, 'B'],
  ];
  const NEW_PRED_VALS = ['0.59', '0.41', '0.77', '0.52', '0.30', '0.64'];

  let built = false;
  let cardEl = null;
  let rpanelEl = null;          // R-session panel (wound down once SQL is in SF)
  let statusEl = null;          // R-session "running" indicator (greyed later)
  let statusText = null;        // its text node ("running" / "not needed")
  let scrollerEl = null;        // inner scroller holding all body rows
  const predSpans = [];         // .pred spans for the first batch
  const predSpans2 = [];        // .pred spans for the freshly-scrolled batch
  // phase machine: 0 = model card | 1 = compiled to SQL chip (more added later)
  let ip = { phase: 0, els: [], token: 0, chip: null };

  function node(cls, x, y, parent) {
    const el = document.createElement('div');
    el.className = 'orb-node ' + cls;
    el.style.transform = `translate(${x}px, ${y}px)`;
    parent.appendChild(el);
    return el;
  }
  function cellXY(col, row) {
    return {
      x: TABLE_X + col * CELL_W,
      y: TABLE_Y + (row === 0 ? 0 : HEAD_H + (row - 1) * ROW_H),
    };
  }
  // body cells live inside the scroller, so their coords are relative to it:
  // column across, row index (0-based) down.
  function bodyCellXY(col, idx) {
    return { x: col * CELL_W, y: idx * ROW_H };
  }
  function sizeCell(el, isHead) {
    el.style.width = CELL_W + 'px';
    el.style.height = (isHead ? HEAD_H : ROW_H) + 'px';
  }

  function build() {
    const stage = document.getElementById('orb-stage');
    if (!stage || built) return !!stage;
    built = true;
    stage.style.width = STAGE_W + 'px';
    stage.style.height = STAGE_H + 'px';
    stage.style.setProperty('--orb-blue', BLUE);
    stage.style.setProperty('--orb-rblue', RBLUE);

    // Posit framing: outer Snowflake container behind everything
    if (POSIT) {
      const sf = node('orb-snowflake', SF.x, SF.y, stage);
      sf.style.width = SF.w + 'px';
      sf.style.height = SF.h + 'px';
    }

    // R-session group: panel + header + card live together so they wind down
    // (dim) as one. The group spans the whole stage; children keep stage coords.
    const rgroup = document.createElement('div');
    rgroup.className = 'orb-rgroup';
    stage.appendChild(rgroup);
    rpanelEl = rgroup;

    // R-session panel (left)
    const rpanel = node('orb-rsession', RPANEL.x, RPANEL.y, rgroup);
    rpanel.style.width = RPANEL.w + 'px';
    rpanel.style.height = RPANEL.h + 'px';
    const rheader = node('orb-rsession-header', RPANEL.x + 24, RPANEL.y + 22, rgroup);
    const rlogo = document.createElement('span');
    rlogo.className = 'orb-rlogo';
    rlogo.textContent = SESSION_LOGO;
    const rlabel = document.createElement('span');
    rlabel.textContent = SESSION_LABEL;
    const status = document.createElement('span');
    status.className = 'orb-status';
    const dot = document.createElement('span');
    dot.className = 'orb-status-dot';
    status.appendChild(dot);
    statusText = document.createTextNode('running');
    status.appendChild(statusText);
    statusEl = status;
    rheader.appendChild(rlogo);
    rheader.appendChild(rlabel);
    rheader.appendChild(status);

    // model card (inside the R-session group)
    const card = node('orb-card', CARD.x, CARD.y, rgroup);
    cardEl = card;
    card.style.width = CARD.w + 'px';
    card.style.height = CARD.h + 'px';
    const ct = document.createElement('div');
    ct.className = 'orb-card-title';
    ct.textContent = 'Trained model';
    const cc = document.createElement('div');
    cc.className = 'orb-card-code';
    cc.textContent = MODEL_LABEL;
    card.appendChild(ct);
    card.appendChild(cc);

    // Snowflake: a standalone panel (non-Posit), or the outer container (Posit)
    // where the data table gets its own nested "Database" box that mirrors the
    // Workbench box — both live inside the Snowflake account (Database = where
    // tables physically sit, the storage counterpart to the compute session).
    if (!POSIT) {
      const panel = node('orb-snowflake', PANEL.x, PANEL.y, stage);
      panel.style.width = PANEL.w + 'px';
      panel.style.height = PANEL.h + 'px';
    } else {
      const db = node('orb-database', PANEL.x, PANEL.y, stage);
      db.style.width = PANEL.w + 'px';
      db.style.height = PANEL.h + 'px';
      const dbh = node('orb-database-header', PANEL.x + 24, PANEL.y + 22, stage);
      const dbicon = document.createElement('span');
      dbicon.className = 'orb-dbicon';
      const dblabel = document.createElement('span');
      dblabel.textContent = 'Database';
      dbh.appendChild(dbicon);
      dbh.appendChild(dblabel);
    }
    const hX = POSIT ? SF.x + 26 : PANEL.x + 24;
    const hY = POSIT ? SF.y + 16 : PANEL.y + 22;
    const header = node('orb-snowflake-header', hX, hY, stage);
    const flake = document.createElement('span');
    flake.className = 'orb-flake';
    flake.textContent = '❄';
    const hlabel = document.createElement('span');
    hlabel.textContent = 'Snowflake';
    header.appendChild(flake);
    header.appendChild(hlabel);

    // header row (fixed — stays put while the body scrolls beneath it)
    COLS.forEach((name, c) => {
      const { x, y } = cellXY(c, 0);
      const cls = 'orb-cell orb-head' + (c === PRED_COL ? ' orb-pred' : '');
      const cell = node(cls, x, y, stage);
      sizeCell(cell, true);
      cell.textContent = name;
    });

    // clipped viewport (below the header) + inner scroller for the body rows
    const view = node('orb-tableview', TABLE_X, TABLE_Y + HEAD_H, stage);
    view.style.width = TABLE_W + 'px';
    view.style.height = VIEW_H + 'px';
    const scroller = document.createElement('div');
    scroller.className = 'orb-scroller';
    view.appendChild(scroller);
    scrollerEl = scroller;
    anime.set(scroller, { translateY: 0 });   // never via the translate() shorthand

    // one body row of cells; predList collects the .pred spans (start empty)
    function buildRow(rowData, idx, predList) {
      for (let c = 0; c < COLS.length; c++) {
        const { x, y } = bodyCellXY(c, idx);
        if (c === PRED_COL) {
          const cell = node('orb-cell orb-pred', x, y, scroller);
          sizeCell(cell, false);
          const span = document.createElement('span');
          span.style.opacity = 0;
          cell.appendChild(span);
          predList.push(span);
        } else {
          const cell = node('orb-cell', x, y, scroller);
          sizeCell(cell, false);
          cell.textContent = rowData[c];
        }
      }
    }
    function buildDots(idx) {
      COLS.forEach((name, c) => {
        const { x, y } = bodyCellXY(c, idx);
        const cell = node('orb-cell orb-dots', x, y, scroller);
        sizeCell(cell, false);
        cell.textContent = '⋮';
      });
    }

    // batch 1 (visible) + its trailing ⋮, then batch 2 (new data, below the
    // fold) + its own ⋮ — exactly one page apart so a one-page scroll swaps them.
    for (let r = 0; r < NROWS; r++) buildRow(DATA[r], r, predSpans);
    buildDots(NROWS);
    for (let r = 0; r < NROWS; r++) buildRow(NEW_DATA[r], NROWS + 1 + r, predSpans2);
    buildDots(2 * NROWS + 1);

    // Posit: dashed divider marking the runtime boundary inside Snowflake
    if (POSIT) {
      if (VERT) {
        const by = (RPANEL.y + RPANEL.h + TABLE_Y) / 2;
        const bd = node('orb-boundary-h', TABLE_X - 10, by, stage);
        bd.style.width = (TABLE_W + 20) + 'px';
      } else {
        const bx = (RPANEL.x + RPANEL.w + TABLE_X) / 2;
        const bd = node('orb-boundary', bx, TABLE_Y - 10, stage);
        bd.style.height = (HEAD_H + (NROWS + 1) * ROW_H + 20) + 'px';
      }
    }
    return true;
  }

  // ---- stage 1: orbital() compiles the model into a SQL chip, in place ----
  const CARD_CX = CARD.x + CARD.w / 2;
  // SQL chip sits where the card is (the model literally becomes SQL); centred
  // on the card (chip ~298px wide incl. padding, ~90px tall)
  const CHIP = { x: CARD_CX - 149, y: CARD.y + CARD.h / 2 - 45 };
  const PILL = { x: CARD_CX - 56, y: CARD.y - 52 };   // orbital() lens above card
  const SQL_HTML =
    '<span class="orb-kw">SELECT</span> *,<br>' +
    '&nbsp;&nbsp;<span class="orb-model">' + MODEL_LABEL + '</span> ' +
    '<span class="orb-kw">AS</span> <span class="orb-col">.pred</span><br>' +
    '<span class="orb-kw">FROM</span> data';

  // chip/pill positioned via anime translateX/Y (never node()'s translate()
  // shorthand — anime can't parse it and would double / drop the offset when we
  // also animate scale).
  function makeAt(cls, x, y) {
    const stage = document.getElementById('orb-stage');
    const el = document.createElement('div');
    el.className = 'orb-node ' + cls;
    stage.appendChild(el);
    ip.els.push(el);
    anime.set(el, { translateX: x, translateY: y });
    return el;
  }

  function makeChip(x, y, scale) {
    const chip = makeAt('orb-sql', x, y);
    chip.innerHTML = SQL_HTML;
    if (scale != null) anime.set(chip, { scale });
    ip.chip = chip;
    return chip;
  }

  // docked position: the compiled SQL tucks into the top-right corner of the
  // Snowflake/Database box and *stays* there — it becomes a standing view that
  // is re-run to generate predictions (rather than dissolving into the table).
  // The chip is ~298px wide (half = 149); scale it down to sit in the corner.
  const CHIP_DOCK_SCALE = 0.7;
  const CHIP_DOCK_MARGIN = 30;   // gap from the panel's right edge
  const CHIP_S = {
    x: PANEL.x + PANEL.w - CHIP_DOCK_MARGIN - 149 * CHIP_DOCK_SCALE - 149,
    y: PANEL.y + 8,
  };

  // once the SQL is in Snowflake, the R session has nothing left to do
  function windDownR() {
    statusEl.classList.add('orb-status-off');
    statusText.textContent = 'not needed';
    rpanelEl.classList.add('orb-rsession-down');
  }
  function restoreR() {
    statusEl.classList.remove('orb-status-off');
    statusText.textContent = 'running';
    rpanelEl.classList.remove('orb-rsession-down');
  }
  function fillPred(spans, vals) {
    spans.forEach((s, i) => { s.textContent = vals[i]; });
    TM.anime({
      targets: spans, opacity: [0, 1],
      duration: 350, delay: anime.stagger(80), easing: 'easeOutQuad',
    });
  }
  // the standing query lights up and gives a quick pulse, as if executed
  function pulseChip() {
    const chip = ip.chip;
    if (!chip) return;
    anime.remove(chip);
    chip.classList.add('orb-sql-active');
    TM.anime({
      targets: chip, scale: CHIP_DOCK_SCALE * 1.07,
      duration: 240, easing: 'easeOutQuad', direction: 'alternate', loop: 2,
    });
  }
  // one-page scroll that swaps batch 1 for the fresh batch below it
  const SCROLL_Y = VIEW_H;

  function clearAll() {
    ip.token++;
    anime.remove(ip.els);
    ip.els.forEach((el) => el.remove());
    ip.els = [];
    ip.chip = null;
    if (cardEl) { anime.remove(cardEl); cardEl.style.opacity = 1; }
    anime.remove(predSpans);
    predSpans.forEach((s) => { s.style.opacity = 0; s.textContent = ''; });
    anime.remove(predSpans2);
    predSpans2.forEach((s) => { s.style.opacity = 0; s.textContent = ''; });
    if (scrollerEl) { anime.remove(scrollerEl); anime.set(scrollerEl, { translateY: 0 }); }
    restoreR();
  }

  function snapTo(phase) {
    clearAll();
    ip.phase = phase;
    if (phase === 0) return;
    if (phase >= 1) cardEl.style.opacity = 0;   // model is now the SQL chip
    if (phase === 1) makeChip(CHIP.x, CHIP.y);
    else if (phase === 2) { makeChip(CHIP_S.x, CHIP_S.y, CHIP_DOCK_SCALE); windDownR(); }
    else {                                       // SQL still docked in the corner,
      const chip = makeChip(CHIP_S.x, CHIP_S.y, CHIP_DOCK_SCALE);  // re-run to fill
      chip.classList.add('orb-sql-active');
      predSpans.forEach((s, i) => { s.textContent = PRED_VALS[i]; s.style.opacity = 1; });
      windDownR();
      if (phase >= 4) {                           // scrolled to a fresh batch
        anime.set(scrollerEl, { translateY: -SCROLL_Y });
      }
      if (phase === 5) {                          // ...and the new batch is scored
        predSpans2.forEach((s, i) => { s.textContent = NEW_PRED_VALS[i]; s.style.opacity = 1; });
      }
    }
  }

  function animateCompile() {          // phase 0 -> 1
    ip.phase = 1;
    const gen = ++ip.token, live = () => ip.token === gen;
    // orbital() lens drops in over the card
    const pill = makeAt('orb-orbital', PILL.x, PILL.y);
    pill.textContent = 'orbital()';
    pill.style.opacity = 0;
    TM.anime({ targets: pill, opacity: 1, scale: [0.7, 1], duration: 260, easing: 'easeOutBack' });
    // the model card fades out as the compiled SQL chip scales in, same spot
    TM.anime({ targets: cardEl, opacity: 0, duration: 380, delay: 200, easing: 'easeInQuad' });
    const chip = makeChip(CHIP.x, CHIP.y);
    chip.style.opacity = 0;
    TM.anime({
      targets: chip, opacity: 1, scale: [0.82, 1],
      duration: 420, delay: 280, easing: 'easeOutBack',
    });
    // the lens has done its job — fade it back out
    TM.pause(900, () => {
      if (!live()) return;
      TM.anime({ targets: pill, opacity: 0, duration: 260, easing: 'easeInQuad' });
    });
  }

  function animateDock() {             // phase 1 -> 2
    ip.phase = 2;
    const gen = ++ip.token, live = () => ip.token === gen;
    const chip = ip.chip || makeChip(CHIP.x, CHIP.y);
    anime.remove(chip);                // cancel any residual tween
    // the query travels into Snowflake and tucks into the top-right corner
    TM.anime({
      targets: chip,
      translateX: CHIP_S.x, translateY: CHIP_S.y, scale: CHIP_DOCK_SCALE,
      duration: 850, easing: 'easeInOutCubic',
    });
    // as the SQL leaves for Snowflake, the R session winds down
    TM.pause(420, () => { if (live()) windDownR(); });
  }

  function animateFill() {             // phase 2 -> 3
    ip.phase = 3;
    const gen = ++ip.token, live = () => ip.token === gen;
    // the docked query stays put and "runs": it lights up and gives a quick
    // pulse, as if being executed to generate the predictions in the table
    pulseChip();
    // predictions appear in place — no round-trip (R session already wound down)
    TM.pause(280, () => { if (live()) fillPred(predSpans, PRED_VALS); });
  }

  function animateScroll() {           // phase 3 -> 4
    ip.phase = 4;
    // scroll the table down one page: the scored rows slide up and out, a fresh
    // batch of (still unscored) rows slides into view from below.
    anime.remove(scrollerEl);
    TM.anime({
      targets: scrollerEl, translateY: -SCROLL_Y,
      duration: 900, easing: 'easeInOutCubic',
    });
  }

  function animateNewFill() {          // phase 4 -> 5
    ip.phase = 5;
    const gen = ++ip.token, live = () => ip.token === gen;
    // the same standing query runs again, scoring the freshly-scrolled rows
    pulseChip();
    TM.pause(280, () => { if (live()) fillPred(predSpans2, NEW_PRED_VALS); });
  }

  // ---- reverse transitions: each mirrors the matching forward step so a single
  // back-nav plays the animation backwards instead of snapping. -------------
  function reverseNewFill() {            // phase 5 -> 4
    ip.phase = 4;
    const gen = ++ip.token, live = () => ip.token === gen;
    // the freshly-scored predictions un-fill (the standing query "un-runs")
    anime.remove(predSpans2);
    TM.anime({
      targets: predSpans2, opacity: [1, 0], duration: 300, easing: 'easeInQuad',
      complete: () => { if (live()) predSpans2.forEach((s) => { s.textContent = ''; }); },
    });
  }

  function reverseScroll() {             // phase 4 -> 3
    ip.phase = 3;
    // scroll the fresh batch back down out of view, the scored rows return
    anime.remove(scrollerEl);
    TM.anime({ targets: scrollerEl, translateY: 0, duration: 900, easing: 'easeInOutCubic' });
  }

  function reverseFill() {               // phase 3 -> 2
    ip.phase = 2;
    const gen = ++ip.token, live = () => ip.token === gen;
    // predictions un-fill and the docked query goes quiet again
    anime.remove(predSpans);
    TM.anime({
      targets: predSpans, opacity: [1, 0], duration: 300, easing: 'easeInQuad',
      complete: () => { if (live()) predSpans.forEach((s) => { s.textContent = ''; }); },
    });
    if (ip.chip) ip.chip.classList.remove('orb-sql-active');
  }

  function reverseDock() {               // phase 2 -> 1
    ip.phase = 1;
    const gen = ++ip.token, live = () => ip.token === gen;
    const chip = ip.chip || makeChip(CHIP_S.x, CHIP_S.y, CHIP_DOCK_SCALE);
    anime.remove(chip);
    // the query travels back out of the corner to its full-size spot on the card
    TM.anime({
      targets: chip, translateX: CHIP.x, translateY: CHIP.y, scale: 1,
      duration: 850, easing: 'easeInOutCubic',
    });
    // as the SQL leaves Snowflake again the R session comes back up
    TM.pause(420, () => { if (live()) restoreR(); });
  }

  function reverseCompile() {            // phase 1 -> 0
    ip.phase = 0;
    const gen = ++ip.token, live = () => ip.token === gen;
    // the orbital() lens drops back in over the (still hidden) card
    const pill = makeAt('orb-orbital', PILL.x, PILL.y);
    pill.textContent = 'orbital()';
    pill.style.opacity = 0;
    TM.anime({ targets: pill, opacity: 1, scale: [0.7, 1], duration: 260, easing: 'easeOutBack' });
    // the compiled SQL chip scales back out as the model card fades back in
    const chip = ip.chip;
    if (chip) {
      TM.anime({
        targets: chip, opacity: 0, scale: 0.82, duration: 380, easing: 'easeInQuad',
        complete: () => {
          if (!live()) return;
          chip.remove();
          const i = ip.els.indexOf(chip); if (i >= 0) ip.els.splice(i, 1);
          ip.chip = null;
        },
      });
    }
    anime.remove(cardEl);
    TM.anime({ targets: cardEl, opacity: 1, duration: 380, delay: 200, easing: 'easeOutQuad' });
    // the lens has done its job — fade it back out and clean it up
    TM.pause(900, () => {
      if (!live()) return;
      TM.anime({
        targets: pill, opacity: 0, duration: 260, easing: 'easeInQuad',
        complete: () => {
          if (!live()) return;
          pill.remove();
          const i = ip.els.indexOf(pill); if (i >= 0) ip.els.splice(i, 1);
        },
      });
    });
  }

  function render(stage) {
    if (!build()) return;
    const target = stage >= 5 ? 5
                 : stage >= 4 ? 4
                 : stage >= 3 ? 3
                 : stage >= 2 ? 2
                 : stage >= 1 ? 1 : 0;
    if (target === ip.phase) return;
    if (target - ip.phase === 1) {       // single forward step -> animate
      if (target === 1) animateCompile();
      else if (target === 2) animateDock();
      else if (target === 3) animateFill();
      else if (target === 4) animateScroll();
      else animateNewFill();
    } else if (ip.phase - target === 1) { // single back step -> reverse animate
      if (ip.phase === 1) reverseCompile();
      else if (ip.phase === 2) reverseDock();
      else if (ip.phase === 3) reverseFill();
      else if (ip.phase === 4) reverseScroll();
      else reverseNewFill();
    } else {                             // multi-step jump -> snap
      snapTo(target);
    }
  }

  TM.gate({
    markerClass: 'orb-slide',
